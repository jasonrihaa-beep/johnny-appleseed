<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#14211A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Johnny Appleseed</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --green-950: #0D1A0F;
  --green-900: #1C2B1E;
  --green-800: #263B28;
  --green-700: #335736;
  --green-600: #4A7C59;
  --green-500: #5E9A6F;
  --green-400: #7DB891;
  --green-200: #B8D9C3;
  --green-100: #D6EBE0;
  --green-50:  #EDF6F1;
  --gold-600:  #B8620A;
  --gold-500:  #D97B1A;
  --gold-400:  #F4A127;
  --gold-200:  #FAD08A;
  --gold-100:  #FEF0CC;
  /* v0.18.0 dark surface remap — semantic tokens only, raw scales unchanged */
  --stone-100: #14211A;  /* near-black forest (was warm white) */
  --stone-200: #1C2B22;  /* raised surface (was pale) */
  --stone-300: rgba(122,153,136,0.22); /* sage border (was solid) */
  --stone-500: #8FA398;  /* dimmed sage text (was darker muted) */
  --stone-700: #C3D2C8;  /* light sage secondary text (was dark secondary) */
  --ink:       #F5F1E8;  /* warm off-white (was near-black) */
  --glass:     rgba(28,43,34,0.72);
  --glass-border: rgba(245,241,232,0.14);
  --glow-amber: rgba(244,161,39,0.22);
  --red-700:   #B91C1C;
  --red-200:   #FECACA;
  --red-50:    #FEF2F2;
  --violet-700: #6D28D9;
  --violet-400: #A78BFA;
  --violet-100: #EDE9FE;
  --violet-50:  #F5F3FF;
  --font-serif: 'Fraunces', Georgia, serif;
  --font-sans:  'DM Sans', system-ui, sans-serif;
  --tab-h: 64px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-top: env(safe-area-inset-top, 0px);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--stone-100);
  color: var(--ink);
  font-family: var(--font-sans);
  font-size: 16px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  overscroll-behavior: none;
}

/* ── APP SHELL ── */
#app {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  max-width: 480px;
  margin: 0 auto;
  background: var(--stone-100);
  position: relative;
}

/* ── TOP BAR ── */
#topbar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--stone-100);
  border-bottom: 1px solid var(--stone-300);
  padding: calc(var(--safe-top) + 12px) 20px 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  min-height: 56px;
  transition: opacity 0.2s;
}
#topbar.map-mode {
  position: absolute;
  top: 0; left: 0; right: 0;
  background: transparent;
  border-bottom: none;
  z-index: 50;
  pointer-events: none;
}
#topbar.map-mode #topbar-wordmark,
#topbar.map-mode #topbar-actions { display: none; }

#topbar-wordmark {
  font-family: var(--font-serif);
  font-size: 20px;
  font-weight: 500;
  color: var(--ink); /* v0.26.0 light so "Johnny" reads on dark topbar */
  letter-spacing: -0.3px;
  line-height: 1;
}

#topbar-wordmark span {
  color: var(--gold-500);
}

#topbar-actions {
  display: flex;
  align-items: center;
  gap: 4px;
}

.icon-btn {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: none;
  background: transparent;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--green-400); /* v0.28.0 light icon on dark topbar */
  transition: background 0.15s;
}
.icon-btn:hover { background: var(--stone-200); }
.icon-btn svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; }

/* ── SCROLL CONTENT ── */
#content {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
}

/* ── TABS ── */
#tab-bar {
  position: sticky;
  bottom: 0;
  z-index: 100;
  background: var(--stone-100);
  border-top: 1px solid var(--stone-300);
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  padding-bottom: var(--safe-bottom);
  min-height: var(--tab-h);
}

.tab-btn { border: none; border-top: 2px solid transparent;
  background: transparent;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  padding: 10px 4px;
  color: var(--stone-500);
  transition: color 0.15s, border-color 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.tab-btn svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; }
.tab-btn .tab-label { font-size: 10px; font-weight: 500; letter-spacing: 0.3px; text-transform: uppercase; }
.tab-btn.active { color: var(--green-400); border-top-color: var(--gold-400); } /* v0.28.0 light on dark */
.tab-btn.active .tab-label { color: var(--green-400); } /* v0.28.0 light on dark */

/* ── VIEWS ── */
.view { display: none; }
.view.active { display: block; }

/* ── MAP VIEW ── */
#map-view {
  position: relative;
  height: calc(100dvh - 56px - var(--tab-h) - var(--safe-top) - var(--safe-bottom));
}
body.tab-map #map-view {
  height: calc(100dvh - var(--tab-h) - var(--safe-bottom));
}

#leaflet-map {
  width: 100%;
  height: 100%;
  background: #14211A; /* v0.21.0 dark so no light flash before tiles load */
  z-index: 1;
}
/* v0.21.0 Leaflet popup dark — scoped tripwire-17 exception: popups are chrome,
   stylable to fix the invisible heading (--ink on white). The map render itself
   (circles, markers, addHazeCircle) remains frozen. Fixes the reported
   Beautyberry bug. */
.leaflet-popup-content-wrapper {
  border-radius: 12px;
  box-shadow: 0 4px 16px rgba(28,43,30,0.15);
  font-family: var(--font-sans);
  background: #1C2B22; /* dark surface, matches --stone-200 */
}
.leaflet-popup-tip { background: #1C2B22; }
.leaflet-popup-content { margin: 12px 16px; font-size: 13px; line-height: 1.5; }
.leaflet-popup-content strong { font-family: var(--font-serif); font-size: 15px; font-weight: 500; color: #F5F1E8; display: block; margin-bottom: 2px; }
.leaflet-popup-content .pin-meta { color: #8FA398; font-size: 12px; }
.leaflet-popup-content .pin-score { color: var(--green-400); font-weight: 600; }

/* v0.9.0 richer DB-pin popup */
.leaflet-popup-content .pin-sci {
  display: block;
  font-style: italic;
  font-size: 12px;
  color: #8FA398; /* v0.21.0 light muted on dark popup */
  margin-bottom: 2px;
}
.leaflet-popup-content .pin-note {
  display: block;
  font-size: 12px;
  color: #C3D2C8; /* v0.21.0 light secondary on dark popup */
  margin-top: 4px;
}
.leaflet-popup-content .pin-badges {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 6px;
}
.leaflet-popup-content .pin-chip {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 100px;
  background: rgba(244,161,39,0.15); /* v0.25.0 dark-compatible */
  border: 1px solid rgba(244,161,39,0.3);
  color: var(--gold-400);
  font-size: 11px;
  font-weight: 500;
}
.leaflet-popup-content .pin-inspire-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 8px;
}
.leaflet-popup-content .pin-inspire {
  padding: 4px 10px;
  font-size: 11px;
}
.leaflet-popup-content .pin-insp-count {
  font-size: 12px;
  font-weight: 600;
  color: var(--green-600);
}

/* v0.38.0 affiliate CTA in DB-pin popups (dormant) */
.leaflet-popup-content .pin-affiliate-row {
  margin-top: 8px;
}
.leaflet-popup-content .pin-affiliate-btn {
  display: inline-block;
  padding: 5px 12px;
  border-radius: 100px;
  border: 1px solid rgba(85,136,102,0.4);
  color: var(--green-400);
  font-size: 11px;
  font-weight: 500;
  text-decoration: none;
}
.leaflet-popup-content .pin-affiliate-disclosure {
  display: block;
  font-size: 10.5px;
  color: #8FA398;
  margin-top: 4px;
  line-height: 1.4;
}

#map-fallback {
  position: absolute;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  background: #14211A; /* v0.21.0 dark fallback state */
  z-index: 5;
  text-align: center;
}
#map-fallback.visible { display: flex; }
#map-fallback p {
  font-family: var(--font-serif);
  font-size: 15px;
  color: var(--green-400); /* v0.28.0 light text on dark */
  font-style: italic;
  line-height: 1.7;
}

/* v0.17.0 haze center dot (divIcon) — the circle itself is an L.circle */
.aps-dot { background: none; border: none; }

/* v0.17.0 haze popup copy */
.leaflet-popup-content .pin-haze {
  display: block;
  font-size: 11.5px;
  color: #8FA398; /* v0.21.0 light muted on dark popup */
  margin-top: 4px;
  line-height: 1.45;
}

/* Map filter bar */
#map-filter {
  position: absolute;
  top: 12px;
  left: 12px;
  right: 12px;
  z-index: 10;
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  row-gap: 6px;
}

.filter-pill {
  flex-shrink: 0;
  padding: 5px 12px;
  border-radius: 100px;
  border: 1px solid var(--stone-300);
  background: var(--stone-100);
  font-size: 11.5px;
  font-weight: 500;
  color: var(--stone-700);
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.15s;
  font-family: var(--font-sans);
  min-height: 30px;
}
.filter-pill.active {
  background: var(--green-700);
  border-color: var(--green-700);
  color: var(--ink); /* v0.28.0 light text on dark pill */
}

/* Plant here FAB */
#plant-fab {
  position: absolute;
  bottom: 20px;
  right: 16px;
  z-index: 10;
  width: 52px;
  height: 52px;
  border-radius: 50%;
  background: var(--green-700);
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 2px 12px rgba(28,43,30,0.25);
  transition: background 0.15s, transform 0.1s;
  -webkit-tap-highlight-color: transparent;
}
#plant-fab:active { transform: scale(0.95); }
#plant-fab svg { width: 22px; height: 22px; stroke: white; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

/* Filter z-index must beat Leaflet panes */
#map-filter { z-index: 1000; }
#plant-fab { z-index: 1000; }

/* ── FEED VIEW ── */
#feed-view { padding: 0 0 16px; }

#feed-pills {
  display: flex;
  gap: 6px;
  padding: 12px 20px 0;
}

/* Follow — .filter-pill styling at reduced size */
.follow-btn {
  flex-shrink: 0;
  padding: 4px 10px;
  border-radius: 100px;
  border: 1px solid var(--stone-300);
  background: var(--stone-100);
  font-size: 11px;
  font-weight: 500;
  color: var(--stone-700);
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.15s;
  font-family: var(--font-sans);
  margin-right: 8px;
  -webkit-tap-highlight-color: transparent;
}
.follow-btn.following {
  background: var(--green-700);
  border-color: var(--green-700);
  color: var(--stone-100);
}

/* ── S4c: comments, overflow, action sheet, blocked list ── */
.comment-btn {
  display: flex;
  align-items: center;
  gap: 5px;
  background: transparent;
  border: 1px solid var(--stone-300);
  border-radius: 100px;
  padding: 5px 12px;
  font-size: 12px;
  font-weight: 500;
  color: var(--stone-500);
  cursor: pointer;
  font-family: var(--font-sans);
  transition: all 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.comment-btn:hover { border-color: var(--green-400); color: var(--green-400); } /* v0.28.0 light hover */
.comment-btn svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 1.8; flex-shrink: 0; }

.overflow-btn {
  width: 28px;
  height: 28px;
  border: none;
  border-radius: 50%;
  background: transparent;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--stone-500);
  flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
}
.overflow-btn:hover { background: var(--stone-200); }
.overflow-btn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.6; stroke-linecap: round; }

.comment-thread { display: none; margin-top: 4px; border-top: 1px solid var(--stone-200); padding-top: 10px; }
.comment-thread.open { display: block; }
.comment-row { padding: 8px 0; border-bottom: 1px solid var(--stone-200); }
.comment-row:last-child { border-bottom: none; }
.comment-head { display: flex; align-items: center; gap: 8px; }
.comment-author { font-size: 13px; font-weight: 500; color: var(--ink); flex: 0 1 auto; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.comment-time { font-size: 11px; color: var(--stone-500); margin-right: auto; }
.comment-body { font-size: 14px; color: var(--ink); line-height: 1.5; margin-top: 2px; overflow-wrap: break-word; }
.comment-empty { font-size: 13px; color: var(--stone-500); font-style: italic; padding: 4px 0 8px; }
.comment-input-row { display: flex; gap: 8px; margin-top: 10px; }
.comment-input-row .form-input { flex: 1; min-width: 0; }

#action-sheet-backdrop {
  display: none;
  position: fixed;
  inset: 0;
  /* v0.20.0 near-opaque — hides map pills/FAB (z 1000) behind it so glass
     sheet doesn't let chrome bleed through */
  background: rgba(13, 26, 15, 0.92);
  /* Above map pills/FAB (z 1000) — the sheet opens over the Map view since v0.10.0 */
  z-index: 1100;
}
#action-sheet-backdrop.open { display: block; }
#action-sheet {
  display: none;
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 480px;
  /* v0.18.0 frosted glass */
  background: var(--glass);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-radius: 16px 16px 0 0;
  padding: 16px 16px calc(16px + var(--safe-bottom));
  z-index: 1101;
  box-shadow: 0 -4px 24px rgba(28, 43, 30, 0.2);
}
#action-sheet.open { display: block; }
.sheet-title {
  font-size: 14px;
  color: var(--stone-700);
  text-align: center;
  padding: 4px 8px 12px;
  line-height: 1.5;
}
.sheet-btn {
  display: block;
  width: 100%;
  padding: 13px;
  margin-bottom: 8px;
  border: 1px solid var(--stone-300);
  border-radius: 12px;
  background: var(--stone-200); /* v0.21.0 dark surface */
  font-size: 14px;
  font-weight: 500;
  font-family: var(--font-sans);
  color: var(--ink);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.sheet-btn.danger { color: var(--red-700); }
.sheet-btn.cancel { border: none; background: transparent; color: var(--stone-500); margin-bottom: 0; }
#action-sheet .form-input { margin-bottom: 8px; }

#blocked-list { display: none; }
#blocked-list.open { display: block; }
.blocked-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 0 10px 12px;
  border-bottom: 1px solid var(--stone-200);
  font-size: 14px;
  color: var(--ink);
}
.blocked-empty { font-size: 13px; color: var(--stone-500); font-style: italic; padding: 10px 0 10px 12px; }

/* ── S4d: notifications panel, badge, Google button, setup sheet ── */
#notif-bell { position: relative; }
#notif-badge {
  display: none;
  position: absolute;
  top: 1px;
  right: 1px;
  min-width: 16px;
  height: 16px;
  padding: 0 4px;
  border-radius: 8px;
  background: var(--gold-500);
  color: white;
  font-size: 10px;
  font-weight: 500;
  line-height: 16px;
  text-align: center;
  font-family: var(--font-sans);
  pointer-events: none;
}
#notif-badge.show { display: block; }

#notif-backdrop {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(13, 26, 15, 0.45);
  z-index: 1150; /* v0.20.0 overlay band (1100-1199) */
}
#notif-backdrop.open { display: block; }
#notif-panel {
  position: fixed;
  top: 0;
  right: 0;
  bottom: 0;
  width: 85%;
  max-width: 360px;
  background: var(--stone-100);
  z-index: 1151; /* v0.20.0 overlay band */
  transform: translateX(100%);
  transition: transform 0.25s ease;
  box-shadow: -4px 0 24px rgba(28, 43, 30, 0.2);
  display: flex;
  flex-direction: column;
}
#notif-panel.open { transform: translateX(0); }
.notif-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: calc(var(--safe-top) + 14px) 12px 12px 20px;
  border-bottom: 1px solid var(--stone-300);
  font-family: var(--font-serif);
  font-size: 18px;
  color: var(--ink);
}
#notif-list { flex: 1; overflow-y: auto; }
.notif-row {
  display: flex;
  align-items: baseline;
  gap: 10px;
  padding: 14px 20px;
  border-bottom: 1px solid var(--stone-200);
  cursor: pointer;
}
.notif-row:hover { background: var(--stone-200); }
.notif-row.unread { background: rgba(85,136,102,0.15); } /* v0.25.0 dark-compatible unread accent */
.notif-text { flex: 1; font-size: 14px; color: var(--ink); line-height: 1.5; }
.notif-time { font-size: 11px; color: var(--stone-500); flex-shrink: 0; }
.notif-empty {
  padding: 32px 24px;
  font-size: 14px;
  color: var(--stone-500);
  font-style: italic;
  text-align: center;
  line-height: 1.6;
}

/* v0.20.0 Google button to spec — branded third-party button, exempt from
   app palette. Hardcode Google's own spec (white + #1F1F1F text + dark G)
   so it stays correct in any theme. Do NOT use --ink (causes white-on-white
   in dark mode). */
.google-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  width: 100%;
  padding: 12px;
  border: 1px solid #DADCE0;
  border-radius: 12px;
  background: #FFFFFF;
  font-size: 14px;
  font-weight: 500;
  font-family: var(--font-sans);
  color: #1F1F1F;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.google-btn svg { width: 18px; height: 18px; stroke: #1F1F1F; fill: none; stroke-width: 1.8; stroke-linecap: round; }
.or-email-label {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  color: var(--stone-500);
  text-align: center;
  padding: 12px 0 8px;
}

.setup-colors {
  display: flex;
  gap: 10px;
  justify-content: center;
  padding: 4px 0 12px;
}
.setup-color {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 2px solid transparent;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.setup-color.selected { border-color: var(--gold-400); box-shadow: 0 0 0 2px white inset; }
.sheet-divider { height: 1px; background: var(--stone-300); margin: 4px 0 12px; }
#action-sheet .google-btn { margin-bottom: 8px; }

.feed-section-label {
  padding: 20px 20px 8px;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--stone-500);
}

.post-card {
  padding: 16px 20px;
  border-bottom: 1px solid var(--stone-300);
  display: flex;
  flex-direction: column;
  gap: 10px;
  /* v0.18.0 frosted glass (NON-map surface) */
  background: var(--glass);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid var(--glass-border);
  border-radius: 12px;
  margin: 0 12px 12px;
}

.post-header {
  display: flex;
  align-items: center;
  gap: 10px;
}

.avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: var(--green-100);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 500;
  color: var(--green-400); /* v0.28.0 light on dark */
  flex-shrink: 0;
  font-family: var(--font-sans);
}

.avatar.gold { background: rgba(244,161,39,0.18); color: var(--gold-400); } /* v0.25.0 dark-compatible */
.avatar.sage { background: rgba(85,136,102,0.22); color: var(--green-400); } /* v0.25.0 dark-compatible */

.post-meta { flex: 1; }
.post-author { font-size: 14px; font-weight: 500; color: var(--ink); }
.post-location { font-size: 12px; color: var(--stone-500); }

.post-time { font-size: 12px; color: var(--stone-500); }

.post-body {
  font-family: var(--font-serif);
  font-size: 16px;
  font-weight: 300;
  color: var(--ink);
  line-height: 1.55;
}

.post-plant-tag {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 4px 10px;
  border-radius: 100px;
  background: rgba(85,136,102,0.15); /* v0.25.0 dark-compatible */
  border: 1px solid rgba(85,136,102,0.3);
  font-size: 12px;
  color: var(--green-400);
  font-weight: 500;
  width: fit-content;
}

.post-plant-tag.edible {
  background: rgba(244,161,39,0.15); /* v0.25.0 dark-compatible */
  border-color: rgba(244,161,39,0.3);
  color: var(--gold-400);
}

.post-plant-tag.pollinator {
  background: rgba(109,40,217,0.15); /* v0.25.0 dark-compatible */
  border-color: rgba(109,40,217,0.3);
  color: var(--violet-400);
}

/* ── Plant autocomplete ── */
#plant-suggest {
  display: none;
  position: absolute;
  top: 100%;
  left: 0;
  right: 0;
  z-index: 50;
  background: var(--stone-200); /* v0.18.0 raised on dark */
  border: 1px solid var(--stone-300);
  border-radius: 10px;
  margin-top: 4px;
  box-shadow: 0 6px 20px rgba(28,43,30,0.12);
  overflow: hidden;
  max-height: 264px;
  overflow-y: auto;
}
#plant-suggest.visible { display: block; }
.suggest-item {
  display: flex;
  align-items: center;
  gap: 10px;
  width: 100%;
  padding: 10px 14px;
  border: none;
  border-bottom: 1px solid var(--stone-300);
  background: var(--stone-200); /* v0.21.0 base dark surface */
  cursor: pointer;
  text-align: left;
  font-family: var(--font-sans);
  -webkit-tap-highlight-color: transparent;
}
.suggest-item:last-child { border-bottom: none; }
.suggest-item:hover { background: var(--stone-200); }
.suggest-dot {
  width: 9px; height: 9px;
  border-radius: 50%;
  flex-shrink: 0;
  background: var(--green-600);
}
.suggest-dot.edible { background: var(--gold-500); }
.suggest-dot.wildlife { background: var(--green-700); }
.suggest-dot.pollinator { background: var(--violet-400); }
.suggest-dot.inv { background: var(--red-700); }
.suggest-text { display: flex; flex-direction: column; min-width: 0; }
.suggest-name { font-size: 14px; color: var(--ink); }
.suggest-sub { font-size: 11px; color: var(--stone-500); font-style: italic; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.suggest-none {
  padding: 12px 14px;
  font-size: 12px;
  color: var(--stone-500);
  line-height: 1.5;
}

.post-plant-tag svg {
  width: 12px; height: 12px;
  stroke: currentColor; fill: none;
  stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round;
}

.post-footer {
  display: flex;
  align-items: center;
  gap: 16px;
}

.inspire-btn {
  display: flex;
  align-items: center;
  gap: 5px;
  background: transparent;
  border: 1px solid var(--stone-300);
  border-radius: 100px;
  padding: 5px 12px;
  font-size: 12px;
  font-weight: 500;
  color: var(--stone-500);
  cursor: pointer;
  font-family: var(--font-sans);
  transition: all 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.inspire-btn:hover { border-color: var(--green-400); color: var(--green-400); } /* v0.28.0 light hover */
.inspire-btn.inspired { border-color: var(--green-400); color: var(--green-400); background: rgba(85,136,102,0.15); } /* v0.25.0 dark-compatible */
.inspire-btn svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 1.8; }

.score-badge {
  margin-left: auto;
  font-size: 11px;
  font-weight: 500;
  color: var(--stone-500);
}
.score-badge span {
  color: var(--green-600);
  font-weight: 600;
}

/* Feed empty state */
.feed-empty {
  padding: 48px 24px;
  text-align: center;
  display: none;
}
.feed-empty.visible { display: block; }
.feed-empty-title {
  font-family: var(--font-serif);
  font-size: 18px;
  font-weight: 400;
  color: var(--ink);
  margin-bottom: 8px;
}
.feed-empty-sub {
  font-size: 14px;
  color: var(--stone-500);
  margin-bottom: 20px;
  line-height: 1.6;
}
.feed-empty-btn {
  display: inline-block;
  padding: 10px 20px;
  background: var(--green-700);
  color: white;
  border: none;
  border-radius: 100px;
  font-size: 13px;
  font-weight: 500;
  font-family: var(--font-sans);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}

/* ── PLANT VIEW ── */
#plant-view { padding: 24px 20px calc(32px + var(--tab-h) + var(--safe-bottom)); }

.plant-view-header {
  margin-bottom: 28px;
}

.plant-view-title {
  font-family: var(--font-serif);
  font-size: 26px;
  font-weight: 400;
  color: var(--ink);
  line-height: 1.2;
  margin-bottom: 6px;
}

.plant-view-subtitle {
  font-size: 14px;
  color: var(--stone-500);
}

.form-group {
  margin-bottom: 20px;
}

.form-label {
  display: block;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  color: var(--stone-500);
  margin-bottom: 7px;
}

.form-input {
  width: 100%;
  padding: 11px 14px;
  border: 1px solid var(--stone-300);
  border-radius: 10px;
  background: var(--stone-200); /* v0.18.0 raised on dark */
  font-size: 15px;
  color: var(--ink);
  font-family: var(--font-sans);
  outline: none;
  transition: border-color 0.15s;
  appearance: none;
}
.form-input:focus { border-color: var(--green-500); }
.form-input::placeholder { color: var(--stone-500); }

.tag-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.tag-option {
  flex: 1;
  min-width: calc(50% - 4px);
  padding: 10px 8px;
  border: 1px solid var(--stone-300);
  border-radius: 10px;
  background: var(--stone-200); /* v0.21.0 dark surface */
  text-align: center;
  font-size: 13px;
  font-weight: 500;
  color: var(--stone-700);
  cursor: pointer;
  font-family: var(--font-sans);
  transition: all 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.tag-option.selected.edible {
  background: rgba(244,161,39,0.18); /* v0.25.0 dark-compatible */
  border-color: var(--gold-400);
  color: var(--gold-400);
}
.tag-option.selected.wildlife {
  background: rgba(85,136,102,0.18); /* v0.25.0 dark-compatible */
  border-color: var(--green-400);
  color: var(--green-400);
}
.tag-option.selected.both {
  background: rgba(85,136,102,0.18); /* v0.25.0 dark-compatible */
  border-color: var(--green-400);
  color: var(--green-400);
}
.tag-option.selected.pollinator {
  background: rgba(109,40,217,0.18); /* v0.25.0 dark-compatible */
  border-color: var(--violet-400);
  color: var(--violet-400);
}
.tag-option.access-option.selected {
  background: rgba(85,136,102,0.18); /* v0.25.0 dark-compatible */
  border-color: var(--green-400);
  color: var(--green-400);
}

/* v0.13.0 kind toggle — THIRD single-select. Styling mirrors .tag-option
   via DUPLICATED rules; class sharing is forbidden (tripwire 13). */
.kind-option {
  flex: 1;
  min-width: calc(50% - 4px);
  padding: 10px 8px;
  border: 1px solid var(--stone-300);
  border-radius: 10px;
  background: var(--stone-200); /* v0.21.0 dark surface */
  text-align: center;
  font-size: 13px;
  font-weight: 500;
  color: var(--stone-700);
  cursor: pointer;
  font-family: var(--font-sans);
  transition: all 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.kind-option.selected {
  background: rgba(85,136,102,0.18); /* v0.25.0 dark-compatible */
  border-color: var(--green-400);
  color: var(--green-400);
}

/* v0.13.0 found-mode identity line */
#found-info {
  display: none;
  border: 1px solid var(--stone-300);
  border-radius: 10px;
  background: var(--stone-200); /* v0.21.0 dark surface */
  padding: 10px 14px;
  margin: -8px 0 20px;
  font-size: 13px;
  line-height: 1.5;
}
#found-info.visible { display: block; }
.found-info-tags { display: block; color: var(--green-400); font-weight: 500; } /* v0.28.0 light on dark */
.found-info-warn { display: block; color: var(--red-700); margin-top: 3px; }
.found-info-note { display: block; color: var(--stone-700); margin-top: 3px; }

/* v0.13.0 Found chip + harvest caution (feed) */
.found-chip {
  display: inline-flex;
  align-items: center;
  padding: 4px 10px;
  border-radius: 100px;
  background: rgba(85,136,102,0.15); /* v0.25.0 dark-compatible */
  border: 1px solid rgba(122,153,136,0.22);
  font-size: 12px;
  color: var(--stone-700);
  font-weight: 500;
  width: fit-content;
}
.found-caution {
  font-size: 12px;
  color: var(--stone-500);
  line-height: 1.5;
}

.form-caption {
  font-size: 12px;
  color: var(--stone-500);
  line-height: 1.5;
  margin-top: 8px;
}

/* Plant Score Preview */
#score-preview {
  padding: 16px;
  margin-bottom: 20px;
  display: none;
  /* v0.18.0 frosted glass */
  background: var(--glass);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid var(--glass-border);
  border-radius: 12px;
}

#score-preview.visible { display: block; }

/* v0.38.0 affiliate CTA (dormant) — empty #score-affiliate renders nothing */
.affiliate-btn {
  display: block;
  width: 100%;
  box-sizing: border-box;
  margin-top: 12px;
  padding: 10px 14px;
  text-align: center;
  background: transparent;
  border: 1px solid var(--stone-300);
  border-radius: 10px;
  font-size: 13px;
  font-weight: 500;
  font-family: var(--font-sans);
  color: var(--green-400);
  text-decoration: none;
  cursor: pointer;
}
.affiliate-btn:hover { border-color: var(--green-400); }
.affiliate-disclosure {
  font-size: 11px;
  color: var(--stone-500);
  text-align: center;
  line-height: 1.5;
  margin: 6px 2px 0;
}

.score-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}

.score-number {
  font-family: var(--font-serif);
  font-size: 36px;
  font-weight: 500;
  color: var(--green-400); /* v0.28.0 light on dark */
  line-height: 1;
}

.score-status {
  font-size: 13px;
  font-weight: 500;
  padding: 4px 10px;
  border-radius: 100px;
  background: rgba(85,136,102,0.15); /* v0.25.0 dark-compatible */
  color: var(--green-400);
  border: 1px solid rgba(85,136,102,0.3);
}
.score-status.warn {
  background: rgba(244,161,39,0.15); /* v0.25.0 dark-compatible */
  color: var(--gold-400);
  border-color: rgba(244,161,39,0.3);
}
.score-status.danger {
  background: var(--red-50);
  color: var(--red-700);
  border-color: var(--red-200);
}

.score-bar-track {
  height: 4px;
  background: var(--stone-200);
  border-radius: 2px;
  overflow: hidden;
  margin-bottom: 10px;
}
.score-bar-fill {
  height: 100%;
  border-radius: 2px;
  background: var(--green-500);
  transition: width 0.6s ease;
}

.score-reason {
  font-size: 13px;
  color: var(--stone-700);
  line-height: 1.5;
}

.submit-btn {
  width: 100%;
  padding: 14px;
  background: var(--green-700);
  color: white;
  border: none;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 500;
  font-family: var(--font-sans);
  cursor: pointer;
  transition: background 0.15s, transform 0.1s;
  -webkit-tap-highlight-color: transparent;
}
.submit-btn:hover { background: var(--green-600); }
.submit-btn:active { transform: scale(0.99); }
.submit-btn:disabled { background: var(--stone-300); color: var(--stone-500); cursor: not-allowed; }

/* v0.14.0 sticky submit bar — sticky inside #content, never fixed (tripwire 14:
   fixed is displaced by the mobile soft keyboard) */
#submit-bar {
  position: sticky;
  bottom: 0;
  z-index: 49; /* one below #plant-suggest (50); far below action sheet (1100/1101) */
  background: var(--stone-100);
  margin: 0 -20px; /* cancels #plant-view's 20px side padding — full-width bar */
  padding: 12px 20px calc(12px + var(--safe-bottom));
}
/* fade scrim — visual-only signal that content continues under the bar */
#submit-bar::before {
  content: "";
  position: absolute;
  left: 0;
  right: 0;
  bottom: 100%;
  height: 24px;
  background: linear-gradient(to top, var(--stone-100), transparent);
  pointer-events: none;
}

/* v0.15.0 photo picker + preview */
#plant-photo-input { display: none; }
#photo-picker {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 14px;
  border: 1.5px dashed rgba(122,153,136,0.3);
  border-radius: 10px;
  background: rgba(85,136,102,0.08); /* v0.25.0 dark-compatible */
  color: var(--stone-700);
  font-size: 14px;
  cursor: pointer;
}
#photo-picker svg { width: 18px; height: 18px; stroke: var(--green-700); fill: none; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; }
#photo-preview-wrap { display: none; position: relative; }
#photo-preview-wrap.visible { display: block; }
#photo-preview-img {
  width: 100%;
  aspect-ratio: 4 / 3;
  object-fit: cover;
  border-radius: 10px;
  display: block;
}
#photo-remove-btn {
  position: absolute;
  top: 8px;
  right: 8px;
  width: 30px;
  height: 30px;
  border: none;
  border-radius: 50%;
  background: rgba(28,43,30,0.72);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}
#photo-remove-btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; }

/* v0.15.0 feed photo — fixed aspect container, no layout shift */
.post-photo {
  width: 100%;
  aspect-ratio: 4 / 3;
  margin: 10px 0 2px;
  border-radius: 10px;
  overflow: hidden;
  background: #1C2B22; /* v0.25.0 dark illustration slot */
}
.post-photo img { width: 100%; height: 100%; object-fit: cover; display: block; }

/* v0.15.0 pin popup thumb — fixed height, Leaflet needs no reflow handling */
.pin-photo {
  width: 100%;
  height: 110px;
  object-fit: cover;
  border-radius: 8px;
  display: block;
  margin: 6px 0 2px;
}

/* v0.15.0 sign-in caption (setup sheet, under Continue with Google) */
.google-caption {
  font-size: 11.5px;
  color: var(--stone-500);
  text-align: center;
  line-height: 1.55;
  margin: 8px 2px 0;
}

/* v0.16.0 location row — visible, sourced, manually placeable (tripwire 15) */
#location-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 14px;
  border: 1px solid var(--stone-300);
  border-radius: 10px;
  background: var(--stone-100);
}
#loc-dot {
  flex-shrink: 0;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--stone-300);
}
#loc-dot.good { background: var(--green-600); }
#loc-dot.warn { background: var(--gold-500); }
#loc-dot.poor { background: var(--red-700); }
#loc-texts { flex: 1; min-width: 0; }
#loc-primary {
  font-size: 13.5px;
  font-weight: 500;
  color: var(--ink);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
#loc-source { font-size: 11.5px; color: var(--stone-500); margin-top: 1px; }
#loc-actions { display: flex; gap: 6px; flex-shrink: 0; }
.loc-btn {
  padding: 6px 10px;
  border-radius: 100px;
  border: 1px solid var(--stone-300);
  background: var(--stone-100);
  font-size: 11.5px;
  font-weight: 500;
  color: var(--green-400); /* v0.28.0 light on dark */
  cursor: pointer;
  white-space: nowrap;
  font-family: var(--font-sans);
}
#loc-center-btn { margin-top: 8px; }

/* v0.16.0 map pick mode — z below the action sheet (1100), above pills/FAB (1000) */
#pick-crosshair {
  display: none;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 1050;
  pointer-events: none;
  color: var(--green-400); /* v0.28.0 light on dark map */
}
#pick-crosshair svg { width: 44px; height: 44px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; }
#pick-controls {
  display: none;
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 1050;
  align-items: center;
  gap: 8px;
}
#pick-confirm {
  padding: 12px 22px;
  border-radius: 100px;
  border: none;
  background: var(--green-700);
  color: var(--stone-100);
  font-size: 14px;
  font-weight: 500;
  font-family: var(--font-sans);
  cursor: pointer;
  box-shadow: 0 2px 12px rgba(28,43,30,0.25);
}
#pick-cancel {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  border: 1px solid var(--stone-300);
  background: var(--stone-100);
  color: var(--stone-700);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  box-shadow: 0 2px 12px rgba(28,43,30,0.18);
}
#pick-cancel svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; }
#map-view.picking #pick-crosshair { display: block; }
#map-view.picking #pick-controls { display: flex; }
#map-view.picking #plant-fab { display: none; }
#map-view.picking #map-filter { display: none; }
/* v0.17.0: haze circles/dots never intercept taps while picking —
   events fall through to the map (panning unaffected) */
#map-view.picking .leaflet-interactive { pointer-events: none; }

/* ── PROFILE VIEW ── */
#profile-view { padding: 24px 20px 32px; }

.profile-hero {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 28px;
  padding-bottom: 24px;
  border-bottom: 1px solid var(--stone-300);
}

.profile-avatar-lg {
  width: 64px;
  height: 64px;
  border-radius: 50%;
  background: var(--green-100);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-serif);
  font-size: 24px;
  font-weight: 400;
  color: var(--green-400); /* v0.28.0 light on dark */
  flex-shrink: 0;
}

.profile-name {
  font-family: var(--font-serif);
  font-size: 22px;
  font-weight: 400;
  color: var(--ink);
}
.profile-handle { font-size: 13px; color: var(--stone-500); margin-top: 2px; }

/* S4a inline editors (name + email upgrade) */
#profile-name-display { cursor: pointer; }
#profile-avatar { cursor: pointer; }
#profile-name-edit { display: none; margin: 4px 0 6px; }
#profile-name-edit.visible { display: block; }
#email-upgrade-edit {
  display: none;
  padding: 12px 0;
  border-bottom: 1px solid var(--stone-300);
}
#email-upgrade-edit.visible { display: block; }
.name-edit-actions { display: flex; gap: 8px; margin-top: 8px; }
.name-edit-btn {
  padding: 8px 16px;
  border-radius: 100px;
  border: 1px solid var(--stone-300);
  background: var(--stone-200); /* v0.21.0 dark surface */
  font-size: 13px;
  font-weight: 500;
  font-family: var(--font-sans);
  color: var(--stone-700);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.name-edit-btn.save {
  background: var(--green-700);
  border-color: var(--green-700);
  color: white;
}

.stat-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 28px;
}

.stat-card {
  background: var(--stone-200); /* v0.21.0 dark surface */
  border: 1px solid var(--stone-300);
  border-radius: 12px;
  padding: 14px 12px;
  text-align: center;
}

.stat-num {
  font-family: var(--font-serif);
  font-size: 24px;
  font-weight: 400;
  color: var(--ink);
  line-height: 1;
  margin-bottom: 4px;
}

.stat-label {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  color: var(--stone-500);
}

.section-title {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--stone-500);
  margin-bottom: 12px;
}

.plant-log-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 0;
  border-bottom: 1px solid var(--stone-300);
}

.plant-log-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--green-400);
  flex-shrink: 0;
}
.plant-log-dot.edible { background: var(--gold-400); }

.plant-log-name {
  flex: 1;
  font-size: 14px;
  color: var(--ink);
  font-weight: 400;
}

.plant-log-date {
  font-size: 12px;
  color: var(--stone-500);
}

.settings-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 0;
  border-bottom: 1px solid var(--stone-300);
  cursor: pointer;
}

.settings-row-label {
  font-size: 14px;
  color: var(--ink);
}

.settings-row-value {
  font-size: 13px;
  color: var(--stone-500);
  display: flex;
  align-items: center;
  gap: 4px;
}

.settings-row-value svg {
  width: 14px; height: 14px;
  stroke: var(--stone-500); fill: none;
  stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round;
}

/* ── LOCATION BAR ── */
#location-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 20px;
  border-bottom: 1px solid var(--stone-300);
  background: var(--stone-200); /* v0.21.0 dark surface */
}
#location-bar svg { width: 14px; height: 14px; stroke: var(--green-600); fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
#location-text { font-size: 13px; color: var(--stone-700); }
#location-text strong { color: var(--green-400); font-weight: 500; } /* v0.28.0 light on dark */

/* ── TOAST ── */
#toast {
  position: fixed;
  bottom: calc(var(--tab-h) + var(--safe-bottom) + 12px);
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--green-900);
  color: var(--ink); /* v0.28.0 light text on dark pill */
  padding: 10px 20px;
  border-radius: 100px;
  font-size: 13px;
  font-weight: 500;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s, transform 0.2s;
  white-space: nowrap;
  z-index: 3000; /* v0.20.0 must never be occluded by sheets (1100-1199) */
  max-width: 320px;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── ONBOARDING SPLASH ── */
#splash {
  position: fixed;
  inset: 0;
  background: var(--stone-100);
  z-index: 2000; /* v0.19.0 above map controls (1000) — must fully occlude */
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 48px 32px;
  text-align: center;
  transition: opacity 0.4s, transform 0.4s;
}
#splash.hidden { opacity: 0; pointer-events: none; transform: scale(0.98); }

/* v0.22.0 hero video + still layers */
.splash-hero {
  position: absolute;
  inset: 0;
  overflow: hidden;
  z-index: 1;
}
/* v0.23.0 legibility scrim — subtle dark overlay so content stays readable */
.splash-hero::after {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(20,33,26,0.35);
  z-index: 10;
  pointer-events: none;
}
.hero-still {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.hero-video {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  opacity: 1;
  transition: opacity 900ms ease-out;
  z-index: 2;
}
.hero-video.fadeout {
  opacity: 0;
}

/* v0.23.0 splash content wrapper — lifts content above hero/fireflies */
.splash-content {
  position: relative;
  z-index: 3;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* v0.18.0 firefly glow — ambient radial gradients behind the content */
#splash::before {
  content: "";
  position: fixed;
  inset: 0;
  z-index: -1;
  background:
    radial-gradient(circle 420px at 50% 35%, var(--glow-amber), transparent 70%),
    radial-gradient(circle 240px at 62% 48%, var(--glow-amber), transparent 75%);
  pointer-events: none;
}

.splash-mark {
  width: 72px;
  height: 72px;
  background: var(--green-800);
  border-radius: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 28px;
}
.splash-mark svg { width: 40px; height: 40px; stroke: var(--gold-400); fill: none; stroke-width: 1.4; stroke-linecap: round; stroke-linejoin: round; }
/* v0.18.0 subtle glow pulse (motion-safe) */
@media (prefers-reduced-motion: no-preference) {
  .splash-mark { animation: firefly-pulse-box 5s ease-in-out infinite; }
}
.splash-mark { box-shadow: 0 0 24px rgba(244,161,39,0.18); }

/* v0.19.0 split: box-shadow for the square mark, text-shadow for the italic em */
@keyframes firefly-pulse-box {
  0%, 100% { box-shadow: 0 0 24px rgba(244,161,39,0.18); }
  50% { box-shadow: 0 0 32px rgba(244,161,39,0.28), 0 0 48px rgba(244,161,39,0.12); }
}
@keyframes firefly-pulse-text {
  0%, 100% { text-shadow: 0 0 12px rgba(244,161,39,0.4), 0 0 24px rgba(244,161,39,0.2); }
  50% { text-shadow: 0 0 16px rgba(244,161,39,0.5), 0 0 32px rgba(244,161,39,0.3), 0 0 48px rgba(244,161,39,0.15); }
}

/* v0.22.0 firefly falling particles */
@media (prefers-reduced-motion: no-preference) {
  @keyframes firefly-fall {
    0% { transform: translateY(-20px) translateX(0); opacity: 0; }
    10% { opacity: 0.6; }
    90% { opacity: 0.4; }
    100% { transform: translateY(100vh) translateX(15px); opacity: 0; }
  }
  .firefly {
    position: absolute;
    top: 0;
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: rgba(244,161,39,0.7);
    z-index: 1999;
    pointer-events: none;
    animation: firefly-fall linear infinite;
  }
}
@media (prefers-reduced-motion: reduce) {
  .firefly { display: none; }
}

.splash-title {
  font-family: var(--font-serif);
  font-size: 32px;
  font-weight: 400;
  color: var(--ink); /* v0.26.0 light so "Johnny" reads on dark hero */
  margin-bottom: 6px;
  letter-spacing: -0.3px;
}
.splash-title em {
  color: var(--gold-400);
  font-style: italic;
  /* v0.19.0 layered text-shadow (no box-shadow square) — strong enough for legibility */
  text-shadow: 0 0 12px rgba(244,161,39,0.4), 0 0 24px rgba(244,161,39,0.2);
}
@media (prefers-reduced-motion: no-preference) {
  .splash-title em { animation: firefly-pulse-text 5s ease-in-out infinite; }
}

.splash-tagline {
  font-size: 15px;
  color: var(--green-200);
  margin-bottom: 48px;
  font-weight: 300;
}

.splash-cta {
  width: 100%;
  max-width: 280px;
  padding: 15px;
  background: var(--gold-400);
  color: var(--green-900);
  border: none;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 500;
  font-family: var(--font-sans);
  cursor: pointer;
  margin-bottom: 12px;
  transition: background 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.splash-cta:hover { background: var(--gold-500); }

.splash-secondary {
  font-size: 13px;
  color: var(--green-400);
  cursor: pointer;
  text-decoration: underline;
  text-underline-offset: 3px;
  background: none;
  border: none;
  font-family: var(--font-sans);
}

.splash-privacy {
  margin-top: 32px;
  font-size: 11px;
  color: var(--green-500);
  line-height: 1.6;
}

/* v0.37.0 language link */
.splash-lang-link {
  margin-top: 16px;
  font-size: 13px;
  color: var(--green-600);
  background: none;
  border: none;
  cursor: pointer;
  text-decoration: underline;
  padding: 0;
}

/* v0.22.0 welcome-back panel */
#welcome-back {
  position: absolute;
  bottom: 180px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 2001;
  background: var(--glass);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid var(--glass-border);
  border-radius: 16px;
  padding: 20px 24px;
  text-align: center;
  max-width: 280px;
  opacity: 0;
  transition: opacity 300ms ease-out;
}
#welcome-back.show {
  opacity: 1;
}
.wb-greeting {
  font-family: var(--font-serif);
  font-size: 18px;
  color: var(--ink);
  margin: 0 0 4px;
}
.wb-prompt {
  font-size: 13px;
  color: var(--stone-500);
  margin: 0 0 16px;
}
.wb-cta {
  background: var(--green-700);
  color: white;
  border: none;
  border-radius: 8px;
  padding: 10px 20px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
}

/* scrollbar — hidden by default (touch: native app feel) */
#content::-webkit-scrollbar { width: 0; }

/* v0.14.0 desktop: slim brand scrollbar — fine-pointer users read it as
   the signal that content continues */
@media (hover: hover) and (pointer: fine) {
  #content {
    scrollbar-width: thin;
    scrollbar-color: var(--stone-300) transparent;
  }
  #content::-webkit-scrollbar { width: 8px; }
  #content::-webkit-scrollbar-thumb {
    background: var(--stone-300);
    border-radius: 4px;
  }
  #content::-webkit-scrollbar-track { background: transparent; }
}
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div class="splash-hero">
    <img src="assets/hero-image.jpg" alt="" class="hero-still">
    <video class="hero-video" muted playsinline autoplay>
      <source src="assets/hero-video.mp4" type="video/mp4">
    </video>
  </div>
  <div class="firefly" style="left:15%;animation-delay:0s;animation-duration:7s"></div>
  <div class="firefly" style="left:28%;animation-delay:1.2s;animation-duration:6.5s"></div>
  <div class="firefly" style="left:42%;animation-delay:2.8s;animation-duration:7.5s"></div>
  <div class="firefly" style="left:58%;animation-delay:0.6s;animation-duration:6.8s"></div>
  <div class="firefly" style="left:71%;animation-delay:3.4s;animation-duration:8s"></div>
  <div class="firefly" style="left:85%;animation-delay:1.8s;animation-duration:6.2s"></div>
  <div class="firefly" style="left:22%;animation-delay:2.2s;animation-duration:7.2s"></div>
  <div class="firefly" style="left:36%;animation-delay:0.4s;animation-duration:6.9s"></div>
  <div class="firefly" style="left:50%;animation-delay:3s;animation-duration:7.8s"></div>
  <div class="firefly" style="left:64%;animation-delay:1.5s;animation-duration:6.4s"></div>
  <div class="firefly" style="left:78%;animation-delay:2.6s;animation-duration:7.6s"></div>
  <div class="firefly" style="left:12%;animation-delay:3.8s;animation-duration:6.6s"></div>
  <div class="splash-content">
  <div class="splash-mark">
    <svg viewBox="0 0 40 40" aria-hidden="true">
      <path d="M20 34C20 34 8 26 8 16a12 12 0 0 1 24 0c0 10-12 18-12 18z"/>
      <circle cx="20" cy="16" r="4"/>
      <path d="M20 20v8"/>
    </svg>
  </div>
  <h1 class="splash-title" translate="no">Johnny <em>Appleseed</em></h1>
  <p class="splash-tagline" data-i18n="splash_tagline"></p>
  <button class="splash-cta" onclick="getStartedFlow()" data-i18n="splash_get_started"></button>
  <button class="splash-secondary" onclick="enterApp()" data-i18n="splash_browse"></button>
  <p class="splash-privacy" data-i18n="splash_privacy"></p>
  <button class="splash-lang-link" id="splash-lang-link" onclick="setLang(LANG === 'en' ? 'es' : 'en')"></button>
  </div><!-- /splash-content -->
  <div id="welcome-back" style="display:none">
    <p class="wb-greeting" id="wb-greeting-text"></p>
    <p class="wb-prompt" data-i18n="splash_ready"></p>
    <button class="wb-cta" data-i18n="splash_lets_go"></button>
  </div>
</div>

<!-- APP -->
<div id="app">

  <!-- TOP BAR -->
  <div id="topbar">
    <span id="topbar-wordmark" translate="no">Johnny <span>Appleseed</span></span>
    <div id="topbar-actions">
      <button class="icon-btn" aria-label="Search" onclick="showToast(t('toast_search_coming_soon'))">
        <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.35-4.35"/></svg>
      </button>
      <button class="icon-btn" id="notif-bell" aria-label="Notifications" onclick="openNotifPanel()">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <span id="notif-badge" aria-hidden="true"></span>
      </button>
    </div>
  </div>

  <!-- CONTENT -->
  <div id="content">

    <!-- MAP VIEW -->
    <div id="map-view" class="view active">
      <div id="map-filter">
        <button class="filter-pill active" onclick="setFilter(this,'all')">All plants</button>
        <button class="filter-pill" onclick="setFilter(this,'edible')" data-i18n="map_filter_edible"></button>
        <button class="filter-pill" onclick="setFilter(this,'wildlife')" data-i18n="map_filter_wildlife"></button>
        <button class="filter-pill" onclick="setFilter(this,'pollinator')" data-i18n="map_filter_pollinators"></button>
        <button class="filter-pill" onclick="setFilter(this,'near')" data-i18n="map_filter_near"></button>
        <button class="filter-pill" onclick="setFilter(this,'open')" data-i18n="map_filter_open"></button>
      </div>
      <div id="leaflet-map"></div>
      <div id="map-fallback">
        <p data-i18n="map_fallback"></p>
      </div>
      <button id="plant-fab" aria-label="Plant something here" onclick="switchTab('plant')">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>
      </button>
      <!-- v0.16.0 pick mode — crosshair fixed at map center, map pans beneath -->
      <div id="pick-crosshair" aria-hidden="true">
        <svg viewBox="0 0 24 24"><path d="M12 2v6M12 16v6M2 12h6M16 12h6"/><circle cx="12" cy="12" r="3"/></svg>
      </div>
      <div id="pick-controls">
        <button id="pick-confirm" onclick="confirmMapPick()">Use this spot</button>
        <button id="pick-cancel" aria-label="Cancel placement" onclick="cancelMapPick()">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
      </div>
    </div>

    <!-- FEED VIEW -->
    <div id="feed-view" class="view">

      <div id="location-bar">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        <span id="location-text"></span>
      </div>

      <div id="feed-pills">
        <button class="filter-pill active" onclick="setFeedMode('nearby', this)" data-i18n="feed_nearby"></button>
        <button class="filter-pill" onclick="setFeedMode('following', this)" data-i18n="feed_following"></button>
      </div>

      <div class="feed-section-label" data-i18n="feed_section_recent"><button id="feed-refresh-btn" onclick="refreshFeed()" aria-label="Refresh feed" style="background:none;border:none;color:var(--green-400);font-size:18px;margin-left:8px;cursor:pointer;padding:0;vertical-align:middle">⟳</button></div>

      <div id="feed-live"></div>

      <div class="feed-empty" id="feed-empty">
        <p class="feed-empty-title" data-i18n="feed_empty_title"></p>
        <p class="feed-empty-sub" data-i18n="feed_empty_sub"></p>
        <button class="feed-empty-btn" onclick="switchTab('plant')" data-i18n="feed_empty_btn"></button>
      </div>

    </div>

    <!-- PLANT VIEW -->
    <div id="plant-view" class="view">
      <div class="plant-view-header">
        <h2 class="plant-view-title" data-i18n="plant_title"></h2>
        <p class="plant-view-subtitle" data-i18n="plant_subtitle"></p>
      </div>

      <div class="form-group">
        <label class="form-label" data-i18n="plant_what_happened"></label>
        <div class="tag-row">
          <button class="kind-option selected" onclick="selectKind(this,'planted')" data-i18n="plant_i_planted"></button>
          <button class="kind-option" onclick="selectKind(this,'discovered')" data-i18n="plant_i_found"></button>
        </div>
      </div>

      <div class="form-group" style="position:relative">
        <label class="form-label" for="plant-name" data-i18n="plant_name_label"></label>
        <input class="form-input" id="plant-name" type="text" data-i18n-attr="placeholder:plant_name_placeholder" autocomplete="off" oninput="onPlantInput(this)">
        <div id="plant-suggest"></div>
      </div>

      <div id="found-info"></div>

      <div class="form-group">
        <label class="form-label" for="plant-location" data-i18n="plant_location_label"></label>
        <input class="form-input" id="plant-location" type="text" data-i18n-attr="placeholder:plant_location_placeholder" readonly onclick="showToast(t('plant_location_toast'))">
      </div>

      <div class="form-group">
        <label class="form-label" data-i18n="plant_type_label"></label>
        <div class="tag-row">
          <button class="tag-option edible" onclick="selectTag(this,'edible')" data-i18n="plant_type_edible"></button>
          <button class="tag-option wildlife selected wildlife" onclick="selectTag(this,'wildlife')" data-i18n="plant_type_wildlife"></button>
          <button class="tag-option pollinator" onclick="selectTag(this,'pollinator')" data-i18n="plant_type_pollinators"></button>
          <button class="tag-option both" onclick="selectTag(this,'both')" data-i18n="plant_type_all"></button>
        </div>
      </div>

      <!-- v0.16.0 location row — location is never guessed silently (tripwire 15) -->
      <div class="form-group">
        <label class="form-label" data-i18n="plant_location_label"></label>
        <div id="location-row">
          <span id="loc-dot" class="none"></span>
          <div id="loc-texts">
            <div id="loc-primary" data-i18n="plant_loc_none"></div>
            <div id="loc-source" data-i18n="plant_loc_none"></div>
          </div>
          <div id="loc-actions">
            <button type="button" class="loc-btn" onclick="refreshLocation()" data-i18n="plant_loc_refresh"></button>
            <button type="button" class="loc-btn" onclick="startMapPick()" data-i18n="plant_loc_map"></button>

        <button type="button" id="loc-center-btn" class="loc-btn" style="display:none" onclick="useMapCenter()" data-i18n="plant_loc_use_center"></button>
        <p class="form-caption" id="loc-hint" style="display:none" data-i18n="plant_loc_hint"></p>
        <p class="form-caption" id="loc-found-hint" style="display:none" data-i18n="plant_loc_found_hint"></p>
        <p class="form-caption" data-i18n="plant_loc_precision"></p>
      </div>

      <div class="form-group">
        <label class="form-label" data-i18n="plant_access_label"></label>
        <div class="tag-row">
          <button class="tag-option access-option" onclick="selectAccess(this,'public')" data-i18n="plant_access_open"></button>
          <button class="tag-option access-option" onclick="selectAccess(this,'ask')" data-i18n="plant_access_ask"></button>
          <button class="tag-option access-option" onclick="selectAccess(this,'private')" data-i18n="plant_access_private"></button>

        <p class="form-caption" data-i18n="plant_access_caption"></p>

      <div class="form-group">
        <label class="form-label" for="plant-note" data-i18n="plant_note_label"></label>
        <input class="form-input" id="plant-note" type="text" data-i18n-attr="placeholder:plant_note_placeholder" maxlength="255">
      </div>

      <!-- v0.15.0 photo picker — no upload at selection time; compress + upload happen in submitPlant -->
      <div class="form-group">
        <label class="form-label" for="plant-photo-input" data-i18n="plant_photo_label"></label>
        <label id="photo-picker" for="plant-photo-input">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
          <span data-i18n="plant_photo_add"></span>
        </label>
        <input type="file" id="plant-photo-input" accept="image/*" onchange="onPhotoPick(this)">
        <div id="photo-preview-wrap">
          <img id="photo-preview-img" data-i18n-attr="alt:plant_photo_preview_alt">
          <button type="button" id="photo-remove-btn" data-i18n-attr="aria-label:plant_photo_remove_label" onclick="removePhoto()">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 6 6 18M6 6l12 12"/></svg>
          </button>
        </div>
      </div>

      <!-- Score Preview -->
      <div id="score-preview">
        <div class="score-header">
          <div>
            <div style="font-size:11px;font-weight:500;letter-spacing:0.8px;text-transform:uppercase;color:var(--stone-500);margin-bottom:4px" data-i18n="score_title"></div>
            <div class="score-number" id="score-num">94</div>
          </div>
          <div class="score-status" id="score-status" data-i18n="score_plant_now"></div>
        </div>
        <div class="score-bar-track">
          <div class="score-bar-fill" id="score-bar" style="width:94%"></div>
        </div>
        <p class="score-reason" id="score-reason"></p>
        <div id="score-affiliate"></div>
      </div>

      <p class="form-caption" id="found-caption" style="display:none" data-i18n="plant_found_caption"></p>

      <!-- v0.14.0 sticky submit bar — the primary action never hides -->
      <div id="submit-bar">
        <button class="submit-btn" id="submit-plant-btn" onclick="submitPlant()" data-i18n="plant_submit"></button>
      </div>
    </div>

    <!-- PROFILE VIEW -->

function t(key, vars) {
  let str = STR[LANG]?.[key];
  if (!str) {
    console.warn(`Missing i18n key: ${key}`);
    return key; // Fallback: return key itself, never undefined
  }
  if (vars) {
    // Template interpolation: {name} -> vars.name
    Object.keys(vars).forEach(k => {
      str = str.replace(new RegExp(`\\{${k}\\}`, 'g'), vars[k]);
    });
  }
  return str;
}

function applyStrings() {
  // Static markup: data-i18n="key" -> textContent
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    el.textContent = t(key);
  });
  // Attributes: data-i18n-attr="placeholder:key,aria-label:key2"
  document.querySelectorAll('[data-i18n-attr]').forEach(el => {
    const pairs = el.getAttribute('data-i18n-attr').split(',');
    pairs.forEach(pair => {
      const [attr, key] = pair.split(':');
      if (attr && key) el.setAttribute(attr.trim(), t(key.trim()));
    });
  });
}

function dbFind(name) {
  const q = name.trim().toLowerCase();
  return PLANT_DB.find(p => p.n.toLowerCase() === q) || null;
}

// v0.39.0 affiliate resolver — returns a URL or null, never anything else.
// Two-stage: destination (buy override or searchTemplate) then, if
// wrapTemplate is configured, wrapped with exactly one encode of the full
// destination. PLANT_DB entries carry NO new data in this build; buy is a
// documented optional slot only (destination URL, wrapped like any other).
function affiliateUrl(plantName) {
  const { enabled, searchTemplate, wrapTemplate, merchantId, tag, queryField } = AFFILIATE_CONFIG;
  if (!enabled || !searchTemplate) return null;
  const entry = dbFind(plantName);
  if (entry?.inv) return null; // invasive exclusion — correctness invariant, checked first
  if (wrapTemplate && (!merchantId || !tag)) return null; // honest states: never emit a half-configured tracking link
  const query = (queryField === 'sci' && entry?.sci) ? entry.sci : (entry?.n || plantName);
  const dest = entry?.buy ? entry.buy : searchTemplate.replace('{q}', encodeURIComponent(query));
  if (!wrapTemplate) return dest;
  return wrapTemplate
    .replace('{mid}', encodeURIComponent(merchantId))
    .replace('{tag}', encodeURIComponent(tag))
    .replace('{dest}', encodeURIComponent(dest));
}

/* ── PlantScore v1 — deterministic, honest, offline ──
   Tiers: 94 native + in window / 88 in window / 62 window edge /
   30 off-season / 8 invasive. Live soil-temp scoring lands in Session 3. */
function plantScore(plant) {
  const now = new Date().getMonth() + 1; // 1-12
  const monthNames = t('months_short').split(',');
  const best = (plant.m || []).map(m => monthNames[m-1]).join(", ");
  if (plant.inv) {
    return { score: 8, status: t('score_do_not_plant'), tier: "danger",
      reason: t('score_reason_invasive', { alt: plant.alt }) };
  }
  let s, status, tier, reason;
  const inWindow = (plant.m || []).includes(now);
  const prev = now === 1 ? 12 : now - 1;
  const next = now === 12 ? 1 : now + 1;
  const nearWindow = (plant.m || []).includes(next) || (plant.m || []).includes(prev);
  if (inWindow) {
    s = plant.native ? 94 : 88;
    status = t('score_plant_now'); tier = "good";
    reason = t('score_reason_in_window', { region: REGION.name, zone: REGION.zone, months: best });
    if (plant.native) reason += t('score_reason_native_suffix');
  } else if (nearWindow) {
    s = 62; status = t('score_window_edge'); tier = "warn";
    reason = t('score_reason_edge', { months: best });
  } else {
    s = 30; status = t('score_wrong_season'); tier = "danger";
    reason = t('score_reason_off_season', { region: REGION.name, months: best });
  }
  if (plant.warn) reason += t('score_reason_caution_prefix') + plant.warn + ".";
  if (plant.note && tier === "good") reason += t('score_reason_note_prefix') + plant.note + ".";
  return { score: s, status: status, tier: tier, reason: reason };
}

/* ── v0.17.0 HAZE: the circle IS the data (tripwire 16) ──
   75 m = the computed rounding-cell extent at ~29.5°N (±55 m lat,
   ±48 m lng, corner ≈ 74 m), centered on the stored coordinate.
   NEVER jittered, never randomized, never resized for aesthetics. */
const HAZE_RADIUS_M = 75;

function dotIcon(color, small) {
  const s = small ? 9 : 14;
  return L.divIcon({
    className: 'aps-dot',
    html: `<span style="display:block;width:${s}px;height:${s}px;border-radius:50%;background:${color};border:1.5px solid white;box-shadow:0 1px 3px rgba(28,43,30,0.3)"></span>`,
    iconSize: [s, s],
    iconAnchor: [s / 2, s / 2],
    popupAnchor: [0, -8]
  });
}

// One rendering path for every pin (decision 6). TYPE keeps color,
// ACCESS sets prominence; the old gold Open-harvest ring lives on as
// the public-tier stroke. Circle and dot share the popup — both tappable.
function addHazeCircle(lat, lng, type, access, popupHtml) {
  const typeColor = PIN_COLORS[type] || PIN_COLORS.both;
  const isPrivate = access === 'private';
  const stroke = isPrivate ? '#8A9988' : (access === 'public' ? '#F4A127' : typeColor);
  const fillOp = access === 'public' ? 0.25 : (isPrivate ? 0.08 : 0.15);
  const circle = L.circle([lat, lng], {
    radius: HAZE_RADIUS_M,
    color: stroke,
    weight: access === 'public' ? 2 : 1.5,
    fillColor: isPrivate ? '#8A9988' : typeColor,
    fillOpacity: fillOp
  }).addTo(map).bindPopup(popupHtml); // Circle gets popup too (task 1)
  const dot = L.marker([lat, lng], { icon: dotIcon(isPrivate ? '#8A9988' : typeColor, isPrivate) })
    .bindPopup(popupHtml); // Dot popup binds before adding to group
  dotMarkers.addLayer(dot); // Add dot to the layerGroup, not directly to map
  markers.push(circle); // Only track circles in markers array (dots managed by dotMarkers group)
}

function initMap() {
  if (map) return;
  if (typeof L === 'undefined') {
    document.getElementById('map-fallback').classList.add('visible');
    return;
  }
  try {
    map = L.map('leaflet-map', { zoomControl: false, attributionControl: true })
      .setView([29.5616, -98.2269], 13); // Cibolo, TX
    L.control.zoom({ position: 'bottomleft' }).addTo(map);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);
    // Dot markers layerGroup + zoom toggle (task 2)
    dotMarkers = L.layerGroup().addTo(map);
    map.on('zoomend', () => {
      const z = map.getZoom();
      if (z >= DOT_HIDE_ZOOM) {
        if (map.hasLayer(dotMarkers)) map.removeLayer(dotMarkers);
      } else {
        if (!map.hasLayer(dotMarkers)) map.addLayer(dotMarkers);
      }
    });
    // Set initial dot visibility from starting zoom
    if (map.getZoom() >= DOT_HIDE_ZOOM) {
      map.removeLayer(dotMarkers);
    }
    map.on('popupopen', onPinPopupOpen); // lazy inspire-count fetch, DB pins only
    renderMarkers('all');
    loadDbPins();
  } catch (e) {
    document.getElementById('map-fallback').classList.add('visible');
  }
}

function renderMarkers(filter) {
  currentFilter = filter;
  markers.forEach(m => map.removeLayer(m));
  markers = [];
  // Clear and rebuild dotMarkers group (pins reload on tab switch)
  if (dotMarkers) dotMarkers.clearLayers();
  // Demo pins (PIN_SPOTS): no access data, so the 'open' filter hides them;
  // circle rendering at the ask-tier neutral treatment (decision 6)
  PIN_SPOTS.forEach(spot => {
    const p = dbFind(spot.db);
    if (!p) return;
    const show = filter === 'all' || filter === 'near' || (p.tags || []).includes(filter);
    if (!show) return;
    const sc = plantScore(p);
    addHazeCircle(spot.lat, spot.lng, pinType(p.tags), 'ask',
      `<strong>${p.n}</strong><span class="pin-meta">Example &mdash; ${p.note} &middot; </span><span class="pin-score">Score ${sc.score}</span>`);
  });
  // Community pins from Supabase — user-generated text must be escaped
  dbPlants.forEach(row => {
    if (isBlocked(row.user_id)) return; // S4c: hide-from-me
    const show = filter === 'all' || filter === 'near' ||
      (filter === 'open' ? row.access === 'public' : (row.tags || []).includes(filter));
    if (!show) return;
    // Missing access on old cached rows gets the quietest tier (defensive)
    addHazeCircle(row.lat, row.lng, pinType(row.tags), row.access || 'private', dbPinPopupHtml(row));
  });
}

/* ── MAP INSPIRE (v0.9.0): richer DB-pin popup + engagement ── */

// (not DB rows: an inspire insert would violate the FK). esc() everywhere.
function dbPinPopupHtml(row) {
  const author = esc(dbPinAuthors[row.user_id] || 'Planter');

  const affUrl = affiliateUrl(row.plant_name);
  const affiliateHtml = affUrl
    ? `<div class="pin-affiliate-row"><a class="pin-affiliate-btn" href="${esc(affUrl)}" target="_blank" rel="sponsored noopener noreferrer">${t('affiliate_cta')}</a><span class="pin-affiliate-disclosure">${t('affiliate_disclosure')}</span></div>`

    // Photo only — no placeholder in popups (space-constrained; omit instead)
    (row.photo_url ? `<img class="pin-photo" src="${esc(row.photo_url)}" alt="${esc(row.plant_name)}" loading="lazy">` : '') +
    `<span class="pin-meta">${isFind ? t('popup_found_by') : t('popup_by')} ${author}${caution}</span>` +
    (row.note ? `<span class="pin-note">${esc(row.note)}</span>` : '') +
    `<div class="pin-badges">` +
      (row.access === 'public' ? `<span class="pin-chip">${t('popup_open_harvest')}</span>` : '') +
      (row.score != null ? `<span class="pin-score">${t('popup_score')} ${row.score}</span>` : '') +
    `</div>` +
    // v0.17.0 haze copy — treasure hunt ONLY on public (decision 3); the
    // neighborhood-level line is a feature statement, not an apology (decision 4)
    (row.access === 'public'
      ? `<span class="pin-haze">${t('popup_haze_hunt')}</span>` +
        `<span class="pin-haze">${t('popup_haze_safety')}</span>`
      : (row.access || 'private') === 'private'
        ? `<span class="pin-haze">${t('popup_haze_private')}</span>`
        : '') +
    `<div class="pin-inspire-row">
      <button class="inspire-btn pin-inspire"
        data-plant="${esc(row.id)}" data-inspired="false" data-count="0"
        onclick="togglePinInspire(this)">
        <svg viewBox="0 0 24 24" style="width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:1.8;flex-shrink:0" aria-hidden="true">${seed}</svg>
        ${t('popup_inspire')}
      </button>
      <span class="pin-insp-count" id="pin-insp-count-${esc(row.id)}">&ndash;</span>
    </div>` +
    affiliateHtml;
}

function setPinInspire(btn, inspired, count) {
  btn.dataset.inspired = String(inspired);
  btn.dataset.count = String(count);
  btn.classList.toggle('inspired', inspired);
  const seed = '<path d="M12 22V12M12 12C12 6 7 3 3 5c0 6 4 9 9 9z"/><path d="M12 12c0-6 5-9 9-7-1 6-5 9-9 9z"/>';
  btn.innerHTML = `<svg viewBox="0 0 24 24" style="width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:1.8;flex-shrink:0" aria-hidden="true">${seed}</svg>${inspired ? ' Inspired' : ' Inspire'}`;
  const span = document.getElementById('pin-insp-count-' + btn.dataset.plant);
  if (span) span.textContent = count > 0 ? String(count) : ''; // hide at 0
}

// Lazy: one fetch per popupopen for that plant only — never prefetched
async function onPinPopupOpen(e) {
  const el = e.popup.getElement();
  if (!el) return;
  const btn = el.querySelector('.pin-inspire');
  if (!btn) return; // example pin — no engagement surface
  if (!sb) return;  // count stays at placeholder
  const plantId = btn.dataset.plant;
  try {
    const { data, error } = await sb.from('inspires')
      .select('user_id').eq('plant_id', plantId);
    if (error) throw error;
    const count = (data || []).length;
    const mine = !!(myUserId && (data || []).some(r => r.user_id === myUserId));
    setPinInspire(btn, mine, count);
  } catch (err) { /* placeholder stands — never fake a count */ }
}

async function togglePinInspire(btn) {
  if (!sb) { showToast(t('toast_sharing_offline')); return; }
  const plantId = btn.dataset.plant;
  const was = btn.dataset.inspired === 'true';
  const wasCount = parseInt(btn.dataset.count || '0', 10) || 0;
  setPinInspire(btn, !was, was ? Math.max(0, wasCount - 1) : wasCount + 1); // in-place, no reopen
  try {
    const session = await ensureAuth(); // anon session is a valid first action
    const me = session.user.id;
    myUserId = me;
    if (!was) {
      // user_id EXPLICIT — inspires have no column default (tripwire 11)
      const { error } = await sb.from('inspires')
        .insert({ plant_id: plantId, user_id: me });
      if (error) throw error;
    } else {
      const { error } = await sb.from('inspires')
        .delete().eq('plant_id', plantId).eq('user_id', me);
      if (error) throw error;
    }
  } catch (e) {
    setPinInspire(btn, was, wasCount); // revert
    showToast(e.message || t('toast_could_not_save'));
  }
}

async function loadDbPins() {
  if (!sb || !map) return;
  try {
    const b = map.getBounds();
    const { data, error } = await sb.from('plants').select('*')
      .gte('lat', b.getSouth()).lte('lat', b.getNorth())
      .gte('lng', b.getWest()).lte('lng', b.getEast())
      .order('planted_at', { ascending: false }).limit(200);
    if (error) throw error;
    dbPlants = data || [];
    // Planter names for popups — existing profiles in-list pattern
    dbPinAuthors = {};
    const uids = [...new Set(dbPlants.map(r => r.user_id))];
    if (uids.length) {
      const { data: profs } = await sb.from('profiles')
        .select('id, display_name').in('id', uids);
      (profs || []).forEach(p => { dbPinAuthors[p.id] = p.display_name; });
    }
    renderMarkers(currentFilter);
  } catch (e) {
    showToast(t('toast_could_not_load_plantings'));
  }
}

function switchTab(tab) {

    document.getElementById(v + '-view').classList.toggle('active', v === tab);

  document.querySelectorAll('.tab-btn').forEach((btn, i) => {
    btn.classList.toggle('active', VIEWS[i] === tab);

function renderFoundInfo(p) {

  let html = bits.length ? `<span class="found-info-tags">${bits.join(' — ')}</span>` : '';

  if (p.warn) html += `<span class="found-info-warn">Caution: ${esc(p.warn)}.</span>`;

  if (hits.length) {
    sugBox.innerHTML = hits.map(p => {

        `<span class="suggest-sub" ${p.inv ? '' : 'translate="no"'}>${sub}</span></span></button>`;
    }).join('');
    sugBox.classList.add('visible');
  } else {
    sugBox.innerHTML = `<div class="suggest-none">${t('plant_not_in_db')}</div>`;
    sugBox.classList.add('visible');
  }
  const exact = dbFind(val);
  if (exact) { renderPlantFacts(exact); } else { hideScore(); hideFoundInfo(); }
}

/* ── SUPABASE WIRING (S2) ── */

// Escape user-generated text before it lands in innerHTML anywhere
function esc(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c =>
    ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
}

// Anonymous-first: sign in silently on first log. Browsing never needs auth.
async function ensureAuth() {
  const { data: { session } } = await sb.auth.getSession();
  if (session) return session;
  const { data, error } = await sb.auth.signInAnonymously();
  if (error) throw error;
  return data.session;
}

/* ── v0.16.0 LOCATION — never guessed silently (tripwire 15) ──
   Every published coordinate is one of exactly three paths: a classified
   GPS fix the user saw, a manual map placement, or an explicit tap on
   "Use map center". The old silent map-center fallback is removed. */
let logLoc = null;       // { lat, lng, accuracy|null, source: 'gps'|'manual'|'center' }
let locFetching = false;

function roundCoord(v) { return Math.round(v * 1000) / 1000; }

// Neighborhood when inside the region box (same ±0.75° as the feed),
// plus the rounded coords — what the user sees is what publishes (decision 2)
function locPrimaryText(lat, lng) {
  const coords = lat.toFixed(3) + ', ' + lng.toFixed(3);
  const inBox = Math.abs(lat - REGION_CENTER.lat) <= 0.75 &&
                Math.abs(lng - REGION_CENTER.lng) <= 0.75;
  return inBox ? REGION.name + ' · ' + coords : coords;
}

function renderLocRow(state) {
  const dot = document.getElementById('loc-dot');
  const prim = document.getElementById('loc-primary');
  const src = document.getElementById('loc-source');
  const hint = document.getElementById('loc-hint');
  const centerBtn = document.getElementById('loc-center-btn');
  dot.className = 'none';
  hint.style.display = 'none';
  centerBtn.style.display = 'none';
  if (state === 'fetching') {
    prim.textContent = 'Finding your location…';
    src.textContent = 'GPS';
    return;
  }
  if (state === 'failed') {
    dot.className = 'poor';
    prim.textContent = 'No location yet';
    src.textContent = 'No location yet';
    hint.style.display = '';
    centerBtn.style.display = '';
    return;
  }
  if (!logLoc) { // 'none'
    prim.textContent = 'No location yet';
    src.textContent = 'No location yet';
    return;
  }
  const rl = roundCoord(logLoc.lat), rg = roundCoord(logLoc.lng);
  prim.textContent = locPrimaryText(rl, rg);
  if (logLoc.source === 'manual') {
    dot.className = 'good';
    src.textContent = 'Placed manually';
  } else if (logLoc.source === 'center') {
    dot.className = 'warn';
    src.textContent = 'Map center';
  } else if (logLoc.accuracy <= 100) {
    dot.className = 'good';
    src.textContent = 'GPS ±' + Math.round(logLoc.accuracy) + 'm';
  } else if (logLoc.accuracy <= 1000) {
    dot.className = 'warn';
    src.textContent = 'GPS ±' + Math.round(logLoc.accuracy) + 'm';
  } else {
    // Poor fix (Android approximate-permission territory): shown, never
    // auto-accepted as final — nudge manual placement (decision 3)
    dot.className = 'poor';
    src.textContent = 'Approximate ±' + (logLoc.accuracy / 1000).toFixed(1) + ' km';
    hint.style.display = '';
  }
}

// Task 2 — high-accuracy wrapper. On any failure: NO coordinates are set
// (tripwire 15); a prior fix, if one exists, is kept untouched.
function refreshLocation() {
  if (!navigator.geolocation) { renderLocRow(logLoc ? 'set' : 'failed'); return; }
  if (locFetching) return;
  locFetching = true;
  renderLocRow('fetching');
  navigator.geolocation.getCurrentPosition(
    pos => {
      locFetching = false;
      logLoc = {
        lat: pos.coords.latitude,
        lng: pos.coords.longitude,
        accuracy: pos.coords.accuracy,
        source: 'gps'
      };
      renderLocRow('set');
    },
    () => {
      locFetching = false;
      if (logLoc) { showToast(t('toast_no_gps')); renderLocRow('set'); }
      else renderLocRow('failed');
    },
    { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
  );
}

// Explicit, labeled choice — only offered in the row's failed state (decision 1)
function useMapCenter() {
  const c = map ? map.getCenter() : REGION_CENTER;
  logLoc = { lat: c.lat, lng: c.lng, accuracy: null, source: 'center' };
  renderLocRow('set');
}

/* Task 3 — map pick mode: crosshair fixed at map center, map pans beneath */

function startMapPick() {
  pickMode = true;

function confirmMapPick() {
