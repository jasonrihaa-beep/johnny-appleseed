/* ── v0.15.0 PHOTO: pick → compress → upload (never blocks a log) ── */
let selectedPhotoFile = null;
let photoPreviewUrl = null;

function onPhotoPick(input) {
  const f = input.files && input.files[0];
  if (!f) return;
  if (!f.type.startsWith('image/')) { showToast(t('toast_choose_image')); input.value = ''; return; }
  selectedPhotoFile = f;
  if (photoPreviewUrl) URL.revokeObjectURL(photoPreviewUrl);
  photoPreviewUrl = URL.createObjectURL(f);
  document.getElementById('photo-preview-img').src = photoPreviewUrl;
  document.getElementById('photo-preview-wrap').classList.add('visible');
  document.getElementById('photo-picker').style.display = 'none';
}

function removePhoto() {
  selectedPhotoFile = null;
  if (photoPreviewUrl) { URL.revokeObjectURL(photoPreviewUrl); photoPreviewUrl = null; }
  document.getElementById('plant-photo-input').value = '';
  document.getElementById('photo-preview-img').removeAttribute('src');
  document.getElementById('photo-preview-wrap').classList.remove('visible');
  document.getElementById('photo-picker').style.display = 'flex';
}

// Canvas downscale to max 1280px longest edge, JPEG q0.82 —
// free-tier storage math depends on this (decision 1)
function compressPhoto(file) {
  return new Promise((resolve, reject) => {
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      URL.revokeObjectURL(url);
      const scale = Math.min(1, 1280 / Math.max(img.naturalWidth, img.naturalHeight));
      const w = Math.round(img.naturalWidth * scale);
      const h = Math.round(img.naturalHeight * scale);
      const canvas = document.createElement('canvas');
      canvas.width = w;
      canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      canvas.toBlob(b => b ? resolve(b) : reject(new Error('Could not process photo')), 'image/jpeg', 0.82);
    };
    img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('Could not read photo')); };
    img.src = url;
  });
}

// Upload failed → offer to log without the photo. Resolves false on any
// dismissal path (closeSheet resolves the pending promise — see below).
let photoContinueResolve = null;
function confirmLogWithoutPhoto() {
  return new Promise(resolve => {
    photoContinueResolve = resolve;
    const sheet = document.getElementById('action-sheet');
    sheet.innerHTML = `
      <div class="sheet-title">The photo could not be uploaded.<br>Log it without the photo?</div>
      <button class="sheet-btn" onclick="resolvePhotoContinue(true)">Log without photo</button>
      <button class="sheet-btn cancel" onclick="resolvePhotoContinue(false)">Cancel</button>`;
    document.getElementById('action-sheet-backdrop').classList.add('open');
    sheet.classList.add('open');
  });
}
function resolvePhotoContinue(goOn) {
  const r = photoContinueResolve;
  photoContinueResolve = null;
  closeSheet();
  if (r) r(goOn);
}

async function submitPlant() {
  const name = document.getElementById('plant-name').value.trim();
  if (!name) { showToast(t('toast_enter_plant_name')); return; }
  if (!sb) { showToast(t('toast_sharing_offline')); return; }
  try {
    // v0.16.0: ONLY the location-row state — the one permitted block
    // (publishing a pin with no location is meaningless; silence was the old bug)
    if (!logLoc) {
      showToast(t('toast_set_location'));
      return;
    }
    // v0.17.0: access is a required explicit choice (decision 5) — the
    // second of the only two legitimate blocks in this form
    if (!selectedAccess) {
      showToast(t('toast_choose_access'));
      return;
    }
    await ensureAuth();
    // 3 decimals ≈ 110 m; matches the DB trigger so the UI preview is honest
    const lat = roundCoord(logLoc.lat);
    const lng = roundCoord(logLoc.lng);
    const p = dbFind(name);
    // Finds carry no score — PlantScore answers a planting-timing question
    const sc = (p && selectedKind !== 'discovered') ? plantScore(p) : null;
    const tags = selectedType === 'both' ? ['edible','wildlife','pollinator'] : [selectedType];
    const note = document.getElementById('plant-note').value.trim() || null;
    // v0.15.0 photo: compress + upload BEFORE the insert (decision 2);
    // any failure offers log-without-photo — never blocks (decision 3)
    let photoUrl = null;
    let photoPath = null;
    if (selectedPhotoFile) {
      try {
        const blob = await compressPhoto(selectedPhotoFile);
        const session = await ensureAuth(); // returns the existing session
        photoPath = session.user.id + '/' + crypto.randomUUID() + '.jpg';
        const { error: upErr } = await sb.storage.from('plant-photos')
          .upload(photoPath, blob, { contentType: 'image/jpeg' });
        if (upErr) throw upErr;
        photoUrl = sb.storage.from('plant-photos').getPublicUrl(photoPath).data.publicUrl;
      } catch (upErr) {
        showToast(upErr.message || t('toast_photo_upload_failed'));
        photoUrl = null;
        photoPath = null;
        const goOn = await confirmLogWithoutPhoto();
        if (!goOn) return;
      }
    }
    // user_id comes from the DB default (auth.uid()) — NEVER send it from the client
    const fields = {
      plant_name: name,
      sci: p ? p.sci : null,
      tags: tags,
      lat: lat,
      lng: lng,
      neighborhood: REGION.name,
      score: sc ? sc.score : null,
      note: note,
      access: selectedAccess,
      kind: selectedKind
    };
    // Key omitted when no photo — logging keeps working even if the
    // photo_url column migration hasn't been applied yet
    if (photoUrl) fields.photo_url = photoUrl;
    const { error } = await sb.from('plants').insert(fields);
    if (error) {
      // Insert failed after a successful upload → best-effort remove (decision 2)
      if (photoPath) {
        try { await sb.storage.from('plant-photos').remove([photoPath]); } catch (rmErr) {}
      }
      showToast(error.message);
      return;
    }
    showToast(t('toast_plant_logged', { plant: name }));
    document.getElementById('plant-name').value = '';
    document.getElementById('plant-note').value = '';
    removePhoto();
    document.getElementById('score-preview').classList.remove('visible');
    loadDbPins();
    loadFeed();
    if (!myProfile) await loadOwnProfile(); // first log created the anon profile
    renderMyPlants(); // update My Plants immediately
    renderProfileStats(); // update stats immediately
    bumpLogCount();
    maybeShowSetupSheet(); // one-shot, first log only (decision 5)
    setTimeout(() => switchTab('feed'), 1200);
  } catch (e) {
    showToast(e.message || t('toast_could_not_log'));
  }
}

function milesBetween(lat1, lng1, lat2, lng2) {
  const R = 3958.8;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 +
    Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) * Math.sin(dLng/2)**2;
  return 2 * R * Math.asin(Math.sqrt(a));
}

function timeAgo(ts) {
  const s = (Date.now() - new Date(ts).getTime()) / 1000;
  if (s < 60) return 'now';
  if (s < 3600) return Math.floor(s/60) + 'm';
  if (s < 86400) return Math.floor(s/3600) + 'h';
  return Math.floor(s/86400) + 'd';
}

/* ── S4b ENGAGEMENT STATE ── */
let feedMode = 'nearby';      // 'nearby' | 'following'
let followedIds = new Set();  // authors the session user follows
let myUserId = null;          // session user id, null when browsing anonymously
let blockedIds = new Set();   // S4c: planters I've blocked (hide-from-me only)

function isBlocked(uid) { return blockedIds.has(uid); }

function setFeedMode(mode, el) {
  feedMode = mode;
  document.querySelectorAll('#feed-pills .filter-pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  loadFeed();

async function refreshFeed() {
  await Promise.all([loadFeed(), loadDbPins()]);
  showToast(t('toast_feed_refreshed'));

let pullStart = null;
let pullDistance = 0;
const PULL_THRESHOLD = 80;

function initPullToRefresh() {
  const feedView = document.getElementById('feed-view');
  feedView.addEventListener('touchstart', e => {
    if (feedView.scrollTop === 0) {
      pullStart = e.touches[0].clientY;
      pullDistance = 0;
    }
  }, { passive: true });
  feedView.addEventListener('touchmove', e => {
    if (pullStart !== null && feedView.scrollTop === 0) {
      pullDistance = e.touches[0].clientY - pullStart;
      if (pullDistance > 0 && pullDistance < PULL_THRESHOLD * 2) {
        e.preventDefault();
      }
    }
  }, { passive: false });
  feedView.addEventListener('touchend', () => {
    if (pullDistance > PULL_THRESHOLD) {
      refreshFeed();
    }
    pullStart = null;
    pullDistance = 0;
  }, { passive: true });
}

async function loadFeed() {
  if (!sb) return;
  try {
    const box = document.getElementById('feed-live');
    const emptyEl = document.getElementById('feed-empty');
    // Session read only — browsing never creates one
    const { data: { session } } = await sb.auth.getSession();
    myUserId = session ? session.user.id : null;
    // Follows + blocks once per load
    followedIds = new Set();
    if (myUserId) {
      const { data: fl } = await sb.from('follows')
        .select('followed_id').eq('follower_id', myUserId);
      (fl || []).forEach(r => followedIds.add(r.followed_id));
      const { data: bl } = await sb.from('blocks')
        .select('blocked_id').eq('blocker_id', myUserId);
      blockedIds = new Set((bl || []).map(r => r.blocked_id));
      if (map) renderMarkers(currentFilter); // re-filter pins now that blocks are known
    }
    let query = sb.from('plants').select('*');
    if (feedMode === 'following') {
      emptyEl.classList.remove('visible');
      if (!followedIds.size) {
        const emptyHtml = `<div class="feed-empty visible">
          <p class="feed-empty-title">${t('feed_following_empty_title')}</p>
          <p class="feed-empty-sub">${t('feed_following_empty_sub')}</p>
        </div>`;
        box.innerHTML = emptyHtml;
        return;
      }
      query = query.in('user_id', [...followedIds]);
    } else {
      // Bounding box ±0.75° ≈ 50 mi around region center; distance sort client-side
      query = query
        .gte('lat', REGION_CENTER.lat - 0.75).lte('lat', REGION_CENTER.lat + 0.75)
        .gte('lng', REGION_CENTER.lng - 0.75).lte('lng', REGION_CENTER.lng + 0.75);
    }
    const { data: rawPlants, error } = await query
      .order('planted_at', { ascending: false }).limit(200);
    if (error) throw error;
    const plants = (rawPlants || []).filter(r => !isBlocked(r.user_id));
    if (!plants || !plants.length) {
      box.innerHTML = '';
      emptyEl.classList.toggle('visible', feedMode === 'nearby');
      return;
    }
    emptyEl.classList.remove('visible');
    // Author names via a second query — no joins needed at MVP scale
    const ids = [...new Set(plants.map(r => r.user_id))];
    const { data: profs } = await sb.from('profiles')
      .select('id, display_name, avatar_color').in('id', ids);
    const profById = {};
    (profs || []).forEach(pr => { profById[pr.id] = pr; });
    // Inspires for visible plants — client-aggregated (decision 3)
    const plantIds = plants.map(r => r.id);
    const { data: insp } = await sb.from('inspires')
      .select('plant_id,user_id').in('plant_id', plantIds);
    const inspCount = {};
    const inspMine = new Set();
    (insp || []).forEach(r => {
      inspCount[r.plant_id] = (inspCount[r.plant_id] || 0) + 1;
      if (myUserId && r.user_id === myUserId) inspMine.add(r.plant_id);
    });
    // Comment counts — same in-list pattern; blocked commenters don't count
    const { data: cmts } = await sb.from('comments')
      .select('plant_id,user_id').in('plant_id', plantIds);
    const cmtCount = {};
    (cmts || []).forEach(r => {
      if (!isBlocked(r.user_id)) cmtCount[r.plant_id] = (cmtCount[r.plant_id] || 0) + 1;
    });
    plants.sort((a, b) =>
      milesBetween(REGION_CENTER.lat, REGION_CENTER.lng, a.lat, a.lng) -
      milesBetween(REGION_CENTER.lat, REGION_CENTER.lng, b.lat, b.lng));
    box.innerHTML = plants.map(row => {
      const prof = profById[row.user_id];
      const author = esc(prof && prof.display_name ? prof.display_name : 'Planter');
      const initials = esc(author.trim().split(/\s+/).map(w => w[0]).join('').slice(0, 2).toUpperCase() || 'P');
      const color = prof && prof.avatar_color ? esc(prof.avatar_color) : '#4A7C59';
      const dist = milesBetween(REGION_CENTER.lat, REGION_CENTER.lng, row.lat, row.lng);
      const tagCls = (row.tags || []).includes('edible') ? ' edible'
        : (row.tags || []).includes('pollinator') ? ' pollinator' : '';
      const mine = inspMine.has(row.id);
      const count = inspCount[row.id] || 0;
      const nComments = cmtCount[row.id] || 0;
      const isOwn = myUserId && row.user_id === myUserId;
      const followBtn = isOwn ? '' :
        `<button class="follow-btn${followedIds.has(row.user_id) ? ' following' : ''}"
          data-author="${esc(row.user_id)}"
          data-following="${followedIds.has(row.user_id)}"
          onclick="toggleFollowDb(this)">${followedIds.has(row.user_id) ? t('feed_following') : t('feed_follow')}</button>`;
      return `<div class="post-card">
        <div class="post-header">
          <div class="avatar" style="background:${color};color:#fff">${initials}</div>
          <div class="post-meta">
            <div class="post-author">${author}</div>
            <div class="post-location">${dist.toFixed(1)} mi away${row.neighborhood ? ' &middot; ' + esc(row.neighborhood) : ''}</div>
          </div>` +
          followBtn +
          `<span class="post-time">${timeAgo(row.planted_at)}</span>
          <button class="overflow-btn" aria-label="More options"
            data-plant="${esc(row.id)}" data-author="${esc(row.user_id)}"
            onclick="openCardSheet(this)">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/></svg>
          </button>
        </div>` +
        (row.photo_url ? `<div class="post-photo"><img src="${esc(row.photo_url)}" alt="${esc(row.plant_name)}" loading="lazy"></div>` : '') +
        (row.note ? `<p class="post-body">${esc(row.note)}</p>` : '') +
        `<div style="display:flex;gap:6px;flex-wrap:wrap">
          <div class="post-plant-tag${tagCls}">
            <svg viewBox="0 0 24 24"><path d="M17 8C8 10 5.9 16.17 3.82 21"/><path d="M9.5 9.5L8 5.5l2-3 2 3z"/></svg>
            ${esc(row.plant_name)}
          </div>` +
          (row.kind === 'discovered' ? `<div class="found-chip">${t('feed_chip_found')}</div>` : '') +
        `</div>` +
        (row.kind === 'discovered' && (row.tags || []).includes('edible')
          ? `<p class="found-caution">${t('feed_caution')}</p>` : '') +
        `
        <div class="post-footer">
          <button class="inspire-btn${mine ? ' inspired' : ''}"
            data-plant="${esc(row.id)}" data-inspired="${mine}" data-count="${count}"
            onclick="toggleInspireDb(this)">
            <svg viewBox="0 0 24 24"><path d="M12 22V12M12 12C12 6 7 3 3 5c0 6 4 9 9 9z"/><path d="M12 12c0-6 5-9 9-7-1 6-5 9-9 9z"/></svg>
            ${mine ? t('feed_inspired') : t('feed_this_inspires_me')}${count > 0 ? ' &middot; ' + count : ''}
          </button>
          <button class="comment-btn" aria-label="Comments"
            data-plant="${esc(row.id)}" data-owner="${esc(row.user_id)}" data-count="${nComments}"
            onclick="toggleComments(this)">
            <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            ${nComments > 0 ? nComments : ''}
          </button>` +
          (row.score != null ? `<span class="score-badge">${t('feed_plant_score')} <span>${row.score}</span></span>` : '') +
        `</div>
        <div class="comment-thread" id="thread-${esc(row.id)}" data-plant="${esc(row.id)}" data-owner="${esc(row.user_id)}"></div>
      </div>`;
    }).join('');
    loadNotifBadge(); // badge refresh rides every feed load (decision 1)
  } catch (e) {
    showToast("Couldn't load nearby plantings");
  }
}

/* ── S4b REAL INSPIRES ── */
function setInspireBtn(btn, inspired, count) {
  btn.dataset.inspired = String(inspired);

}

async function toggleInspireDb(btn) {
  if (!sb) { showToast(t('toast_sharing_offline')); return; }
  const plantId = btn.dataset.plant;
  const was = btn.dataset.inspired === 'true';
  const wasCount = parseInt(btn.dataset.count || '0', 10) || 0;
  setInspireBtn(btn, !was, was ? Math.max(0, wasCount - 1) : wasCount + 1); // optimistic
  try {
    // Inspiring is a valid first action — anon session created if needed
    const session = await ensureAuth();
    const me = session.user.id;
    myUserId = me;
    if (!was) {
      // No column defaults on inspires — send both ids explicitly (tripwire 11)
      const { error } = await sb.from('inspires')
        .insert({ plant_id: plantId, user_id: me });
      if (error) throw error;
    } else {
      const { error } = await sb.from('inspires')
        .delete().eq('plant_id', plantId).eq('user_id', me);
      if (error) throw error;
    }
  } catch (e) {
    setInspireBtn(btn, was, wasCount); // revert
    showToast(e.message || t('toast_could_not_save'));
  }
}

/* ── S4b FOLLOWS ── */
function setFollowBtns(author, following) {
  document.querySelectorAll(`.follow-btn[data-author="${author}"]`).forEach(b => {
    b.dataset.following = String(following);
    b.classList.toggle('following', following);
    b.textContent = following ? 'Following' : 'Follow';
  });
}

async function toggleFollowDb(btn) {
  if (!sb) { showToast(t('toast_sharing_offline')); return; }
  const author = btn.dataset.author;
  const was = btn.dataset.following === 'true';
  setFollowBtns(author, !was); // optimistic, all cards by this author
  try {
    const session = await ensureAuth();
    const me = session.user.id;
    myUserId = me;
    if (author === me) { setFollowBtns(author, was); return; } // own card guard
    if (!was) {
      // No column defaults on follows — send both ids explicitly (tripwire 11)
      const { error } = await sb.from('follows')
        .insert({ follower_id: me, followed_id: author });

      followedIds.add(author);
    } else {
      const { error } = await sb.from('follows')
        .delete().eq('follower_id', me).eq('followed_id', author);

      followedIds.delete(author);
    }
  } catch (e) {
    setFollowBtns(author, was); // revert
    showToast(e.message || t('toast_could_not_save'));

}

/* ── S4c COMMENT THREADS ── */
function setCommentCount(plantId, count) {
  const btn = document.querySelector(`.comment-btn[data-plant="${plantId}"]`);
  if (!btn) return;
  btn.dataset.count = String(count);
  const bubble = '<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>';
  btn.innerHTML = `<svg viewBox="0 0 24 24" style="width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:1.8;flex-shrink:0" aria-hidden="true">${bubble}</svg>${count > 0 ? ' ' + count : ''}`;
}

async function toggleComments(btn) {
  const plantId = btn.dataset.plant;
  const thread = document.getElementById('thread-' + plantId);
  if (!thread) return;
  if (thread.classList.contains('open')) { thread.classList.remove('open'); return; }
  thread.classList.add('open');
  if (thread.dataset.loaded !== '1') await loadComments(plantId); // lazy — first expand only
}

function commentRowHtml(c, name, plantOwner) {
  return `<div class="comment-row" data-comment="${esc(c.id)}" data-author="${esc(c.user_id)}">
    <div class="comment-head">
      <span class="comment-author">${esc(name)}</span>
      <span class="comment-time">${timeAgo(c.created_at)}</span>
      <button class="overflow-btn" aria-label="Comment options"
        data-comment="${esc(c.id)}" data-author="${esc(c.user_id)}"
        data-plant="${esc(c.plant_id)}" data-plant-owner="${esc(plantOwner)}"
        onclick="openCommentSheet(this)">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/></svg>
      </button>
    </div>
    <p class="comment-body">${esc(c.body)}</p>
  </div>`;
}

async function loadComments(plantId) {
  if (!sb) return;
  const thread = document.getElementById('thread-' + plantId);
  const plantOwner = thread.dataset.owner;
  try {
    const { data: raw, error } = await sb.from('comments')
      .select('id,plant_id,user_id,body,created_at')
      .eq('plant_id', plantId).order('created_at');
    if (error) throw error;
    const comments = (raw || []).filter(c => !isBlocked(c.user_id)); // hide-from-me
    let nameById = {};
    if (comments.length) {
      const ids = [...new Set(comments.map(c => c.user_id))];
      const { data: profs } = await sb.from('profiles')
        .select('id, display_name').in('id', ids);
      (profs || []).forEach(p => { nameById[p.id] = p.display_name; });
    }
    const rows = comments.length
      ? comments.map(c => commentRowHtml(c, nameById[c.user_id] || 'Planter', plantOwner)).join('')
      : '<p class="comment-empty">Be the first to say something kind.</p>';
    thread.innerHTML = `<div class="comment-rows">${rows}</div>
      <div class="comment-input-row">
        <input class="form-input comment-input" type="text" maxlength="280"
          placeholder="Say something kind..." autocomplete="off">
        <button class="name-edit-btn save" onclick="sendComment(this, '${esc(plantId)}')">Send</button>
      </div>`;
    thread.dataset.loaded = '1';
    setCommentCount(plantId, comments.length);
  } catch (e) {
    showToast(t('toast_could_not_load_comments'));
    thread.classList.remove('open');
  }
}

async function sendComment(btn, plantId) {
  if (!sb) { showToast(t('toast_sharing_offline')); return; }
  const thread = document.getElementById('thread-' + plantId);
  const input = thread.querySelector('.comment-input');
  const body = input.value.trim();
  if (!body) { showToast(t('toast_write_comment_first')); return; }
  const rowsBox = thread.querySelector('.comment-rows');
  const emptyEl = rowsBox.querySelector('.comment-empty');
  let tempEl = null;
  try {
    const session = await ensureAuth();
    myUserId = session.user.id;
    // Optimistic append
    if (emptyEl) emptyEl.remove();
    const tempComment = { id: 'pending', plant_id: plantId, user_id: myUserId, body: body, created_at: new Date().toISOString() };
    const myName = myProfile ? myProfile.display_name : 'Planter';
    rowsBox.insertAdjacentHTML('beforeend', commentRowHtml(tempComment, myName, thread.dataset.owner));
    tempEl = rowsBox.querySelector('.comment-row[data-comment="pending"]');
    input.value = '';
    // user_id has a DB default (auth.uid()) — comments follow the plants pattern
    const { data, error } = await sb.from('comments')
      .insert({ plant_id: plantId, body: body }).select('id').single();
    if (error) throw error;
    tempEl.dataset.comment = data.id;
    const ofBtn = tempEl.querySelector('.overflow-btn');
    if (ofBtn) ofBtn.dataset.comment = data.id;
    const n = rowsBox.querySelectorAll('.comment-row').length;
    setCommentCount(plantId, n);
  } catch (e) {
    if (tempEl) tempEl.remove(); // revert optimistic append
    input.value = body;
    showToast(e.message || t('toast_could_not_post_comment')); // DB cap message surfaces as-is
  }
}

async function deleteComment(commentId, plantId) {
  if (!sb) return;
  try {
    const { error } = await sb.from('comments').delete().eq('id', commentId);
    if (error) throw error;
    const row = document.querySelector(`.comment-row[data-comment="${commentId}"]`);
    if (row) row.remove();
    const thread = document.getElementById('thread-' + plantId);
    if (thread) {
      const n = thread.querySelectorAll('.comment-row').length;
      setCommentCount(plantId, n);
      if (n === 0) {
        const rowsBox = thread.querySelector('.comment-rows');
        if (rowsBox) rowsBox.innerHTML = '<p class="comment-empty">Be the first to say something kind.</p>';
      }
    }
    showToast(t('toast_comment_deleted'));
  } catch (e) {
    showToast(e.message || t('toast_could_not_delete_comment'));
  }
}

/* ── S4c ACTION SHEET ── */
let sheetActions = [];

function openSheet(items, title) {
  sheetActions = items;
  const sheet = document.getElementById('action-sheet');
  sheet.innerHTML =
    (title ? `<div class="sheet-title">${title}</div>` : '') +
    items.map((it, i) =>
      `<button class="sheet-btn${it.danger ? ' danger' : ''}" onclick="runSheetAction(${i})">${it.label}</button>`
    ).join('') +
    '<button class="sheet-btn cancel" onclick="closeSheet()">Cancel</button>';
  document.getElementById('action-sheet-backdrop').classList.add('open');
  sheet.classList.add('open');
}

function runSheetAction(i) {
  const a = sheetActions[i];
  closeSheet();
  if (a && a.handler) a.handler();
}

function closeSheet() {
  document.getElementById('action-sheet-backdrop').classList.remove('open');
  document.getElementById('action-sheet').classList.remove('open');
  sheetActions = [];
  // v0.15.0: dismissing the photo-confirm sheet by any path counts as Cancel
  if (photoContinueResolve) { photoContinueResolve(false); photoContinueResolve = null; }
}

function openCardSheet(btn) {
  const plantId = btn.dataset.plant;
  const author = btn.dataset.author;
  const isOwn = myUserId && author === myUserId;
  // Own content: Delete only. Others': Report + Block, never Delete.
  if (isOwn) {
    openSheet([
      { label: 'Delete planting', danger: true, handler: () => confirmDeletePlant(plantId) }
    ]);
  } else {
    openSheet([
      { label: 'Report', handler: () => openReportSheet('plant', plantId) },
      { label: 'Block planter', danger: true, handler: () => confirmBlock(author) }
    ]);
  }
}

// v0.15.0: this pair was referenced by the card sheet but never defined —
// own-plant delete now exists, with best-effort photo hygiene (decision 6)
function confirmDeletePlant(plantId) {
  openSheet(
    [{ label: 'Delete planting', danger: true, handler: () => doDeletePlant(plantId) }],
    'Delete this planting? This cannot be undone.'
  );
}

async function doDeletePlant(plantId) {
  if (!sb || !myUserId) return;
  try {
    // .select() returns the deleted row — one call, and photo_url comes back with it
    const { data, error } = await sb.from('plants')
      .delete().eq('id', plantId).select('photo_url');
    if (error) throw error;
    // Best-effort storage remove; orphaned files otherwise accepted (decision 6)
    const url = data && data[0] && data[0].photo_url;
    if (url && url.includes('/plant-photos/')) {
      const path = decodeURIComponent(url.split('/plant-photos/')[1] || '');
      if (path) {
        sb.storage.from('plant-photos').remove([path])
          .then(({ error: rmErr }) => { if (rmErr) console.log('photo remove failed:', rmErr.message); });
      }
    }
    showToast(t('toast_planting_deleted'));
    loadDbPins();
    loadFeed();
  } catch (e) {
    showToast(e.message || t('toast_could_not_delete'));
  }
}

function openCommentSheet(btn) {
  const commentId = btn.dataset.comment;
  const author = btn.dataset.author;
  const plantId = btn.dataset.plant;
  const plantOwner = btn.dataset.plantOwner;
  if (commentId === 'pending') return; // still saving
  const isOwnComment = myUserId && author === myUserId;
  const ownsPlant = myUserId && plantOwner === myUserId;
  const items = [];
  if (isOwnComment || ownsPlant) {
    items.push({ label: 'Delete comment', danger: true, handler: () => deleteComment(commentId, plantId) });
  }
  if (!isOwnComment) {
    items.push({ label: 'Report', handler: () => openReportSheet('comment', commentId) });
    items.push({ label: 'Block planter', danger: true, handler: () => confirmBlock(author) });
  }
  if (items.length) openSheet(items);
}

async function submitReport(targetType, targetId) {

/* ── S4c BLOCK (hide-from-me) ── */
function confirmBlock(author) {
  openSheet(
    [{ label: 'Block planter', danger: true, handler: () => doBlock(author) }],
    'Hide everything from this planter? You can unblock in Settings.'
  );
}

async function doBlock(author) {
  if (!sb) { showToast(t('toast_sharing_offline')); return; }
  try {
    const session = await ensureAuth();
    const me = session.user.id;
    myUserId = me;
    if (author === me) return;
    // No column defaults on blocks — send both ids explicitly (tripwire 11)
    const { error } = await sb.from('blocks')
      .insert({ blocker_id: me, blocked_id: author });

    blockedIds.add(author);
    showToast(t('toast_planter_blocked'));

async function toggleBlockedList() {

  if (list.classList.contains('open')) { list.classList.remove('open'); return; }
  list.classList.add('open');
  await renderBlockedList();
}

async function renderBlockedList() {
  const list = document.getElementById('blocked-list');
  if (!list.classList.contains('open')) return;
  if (!sb || !myUserId || !blockedIds.size) {
    list.innerHTML = '<p class="blocked-empty">No blocked planters.</p>';

       <button class="name-edit-btn" onclick="unblockPlanter('${esc(p.id)}')">Unblock</button></div>`
    ).join('') || '<p class="blocked-empty">No blocked planters.</p>';

    list.innerHTML = '<p class="blocked-empty">Could not load list.</p>';

async function unblockPlanter(id) {

  try {
    const { error } = await sb.from('blocks')
      .delete().eq('blocker_id', myUserId).eq('blocked_id', id);
    if (error) throw error;
    blockedIds.delete(id);
    showToast(t('toast_planter_unblocked'));

// No realtime — badge fetched on load and after user actions (decision 1)
async function loadNotifBadge() {
  if (!sb) return;
  try {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) { setNotifBadge(0); return; }
    const { count, error } = await sb.from('notifications')
      .select('id', { count: 'exact', head: true })
      .eq('user_id', session.user.id).eq('read', false);

    setNotifBadge(count || 0);

function notifText(n, nameById, plantById) {
  const who = esc(nameById[n.actor_id] || 'Planter');
  const plant = n.plant_id ? esc(plantById[n.plant_id] || 'planting') : '';
  if (n.type === 'inspire') return who + ' inspired your ' + plant;

async function openNotifPanel() {
  const panel = document.getElementById('notif-panel');
  const backdrop = document.getElementById('notif-backdrop');
  const list = document.getElementById('notif-list');
  panel.classList.add('open');
  backdrop.classList.add('open');
  const emptyHtml = '<p class="notif-empty">Quiet for now. Plant something worth talking about.</p>';
  if (!sb) { list.innerHTML = emptyHtml; return; }
  try {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) { list.innerHTML = emptyHtml; return; }
    const me = session.user.id;
    const { data: notifs, error } = await sb.from('notifications')
      .select('id,actor_id,type,plant_id,read,created_at')
      .eq('user_id', me)
      .order('created_at', { ascending: false }).limit(50);
    if (error) throw error;
    const visible = (notifs || []).filter(n => !isBlocked(n.actor_id));
    if (!visible.length) {
      list.innerHTML = emptyHtml;
    } else {
      const actorIds = [...new Set(visible.map(n => n.actor_id))];
      const { data: profs } = await sb.from('profiles')
        .select('id, display_name').in('id', actorIds);
      const nameById = {};
      (profs || []).forEach(p => { nameById[p.id] = p.display_name; });
      const plantIds = [...new Set(visible.filter(n => n.plant_id).map(n => n.plant_id))];
      const plantById = {};
      if (plantIds.length) {
        const { data: pls } = await sb.from('plants')

async function getStartedFlow() {

  } catch (e) { return; }

// ja_setup_seen is a sacred key — one-shot, set at show so the

function maybeShowSetupSheet() {

function openSetupSheet(title, body, prefillName, hideGoogle) {

function pickSetupColor(btn) {
  setupColor = btn.dataset.color;
  document.querySelectorAll('.setup-color').forEach(b => b.classList.toggle('selected', b === btn));
}

// Unified Google sign-in for both contexts (setup sheet + Profile row).
// Tries linkIdentity FIRST (new anonymous users, keeps plants), then falls
// back to signInWithOAuth on ANY link error (returning users).
async function googleSignIn() {
  if (!sb) { showAuthError('Sharing is offline right now — try again later'); return; }
  try {
    // Tab-scoped return marker — NOT a sacred ja_ localStorage key
    try { sessionStorage.setItem('ja_oauth_return', '1'); } catch (e) {}
    const opts = { provider: 'google', options: { redirectTo: window.location.origin } };
    const { data: { session } } = await sb.auth.getSession();
    let error;
    if (session && session.user.is_anonymous) {
      // Anonymous session: try linkIdentity FIRST (keeps plants)
      ({ error } = await sb.auth.linkIdentity(opts));
      if (error) {
        // ANY link error -> purge zombie session, then fall back to sign-in
        console.error('linkIdentity failed, purging local session and falling back to signInWithOAuth:', error);
        try { await sb.auth.signOut({ scope: 'local' }); } catch (signOutErr) { /* ignore */ }
        ({ error } = await sb.auth.signInWithOAuth(opts));
      }
    } else {
      // No session or already durable -> sign in directly
      ({ error } = await sb.auth.signInWithOAuth(opts));
    }
    if (error) throw error;
    // Browser redirects to Google from here
  } catch (e) {
    try { sessionStorage.removeItem('ja_oauth_return'); } catch (ex) {}
    showAuthError(e.message || 'Could not start Google sign-in', e);
  }
}

/* ── OAUTH RETURN (v0.12.0): acknowledge the landing ── */
async function handleOauthReturn() {
  // a) Parse OAuth errors from BOTH query string and hash fragment
  const hashParams = new URLSearchParams((location.hash || '').replace(/^#/, ''));
  const searchParams = new URLSearchParams(location.search || '');
  const err = hashParams.get('error') || searchParams.get('error');
  const errCode = hashParams.get('error_code') || searchParams.get('error_code');
  const errDesc = hashParams.get('error_description') || searchParams.get('error_description');

  if (err || errDesc) {
    // AUTO-RECOVER on identity_already_exists: purge zombie + auto-retry
    const isIdentityError = errCode === 'identity_already_exists' ||
                           (errDesc && errDesc.toLowerCase().includes('already linked'));
    if (isIdentityError) {
      // Loop guard: if we already auto-retried once, stop and show error
      let autoRetry = null;
      try { autoRetry = sessionStorage.getItem('ja_oauth_autoretry'); } catch (e) {}
      if (autoRetry === '1') {
        // Already retried — clear guard and show error
        try { sessionStorage.removeItem('ja_oauth_autoretry'); } catch (e) {}
        console.error('Auto-retry failed, identity still exists:', errDesc);
        showAuthError(errDesc || 'Identity is already linked to another user',
                     { error: err, error_code: errCode, error_description: errDesc });
        history.replaceState(null, '', location.pathname);
        return;
      }
      // First identity error — auto-recover
      console.log('Identity error detected, auto-recovering with fresh sign-in:', errDesc);
      try { await sb.auth.signOut({ scope: 'local' }); } catch (signOutErr) { /* ignore */ }
      try { sessionStorage.setItem('ja_oauth_autoretry', '1'); } catch (e) {}
      history.replaceState(null, '', location.pathname);
      // Redirect to Google sign-in
      const { error } = await sb.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: window.location.origin }
      });
      if (error) {
        showAuthError('Could not retry sign-in after identity error', error);
      }
      return;
    }
    // All other OAuth errors: show verbatim error_description
    showAuthError(errDesc || err, { error: err, error_code: errCode, error_description: errDesc });
    history.replaceState(null, '', location.pathname);
    return;
  }

  // b/c) Return marker (tab-scoped sessionStorage, not sacred)
  let marker = null;
  try { marker = sessionStorage.getItem('ja_oauth_return'); } catch (e) {}
  if (marker !== '1') return;
  try { sessionStorage.removeItem('ja_oauth_return'); } catch (e) {}
  if (!sb) return;
  try {
    const { data: { session } } = await sb.auth.getSession();
    if (!session || session.user.is_anonymous !== false) {
      // c) marker set but still anonymous — link failed upstream
      showAuthError("Google sign-in didn't complete. The session is still anonymous. Try again from your Profile.", { session });
      return;
    }
    // Success: clear auto-retry guard
    try { sessionStorage.removeItem('ja_oauth_autoretry'); } catch (e) {}
    showToast(t('toast_garden_protected'));
    await loadOwnProfile(); // this re-renders hero, plants, stats
    renderProfileHero(); // explicit re-render
    renderMyPlants();
    renderProfileStats();
    if (myProfile && myProfile.display_name === 'Planter') {
      // First name ONLY — surnames are doxxing surface on a public
      // location-tagged map (decision 1). Editable, user must Save.
      const meta = session.user.user_metadata || {};
      let suggest = meta.given_name || '';
      if (!suggest) {
        const full = meta.full_name || meta.name || '';
        suggest = String(full).trim().split(/\s+/)[0] || '';
      }
      // Gated by marker + default name only (decision 3)
      openSetupSheet('Garden protected.', 'What should neighbors call you?', suggest, true);
    }
  } catch (e) {
    showAuthError(e.message || 'Could not finish sign-in', e);
  }
}

async function saveSetupSheet() {
  const name = (document.getElementById('setup-name').value || '').trim();
  closeSheet();
  if (!myProfile) return; // profile still in flight — defaults stand
  const updates = {};
  if (name && name !== myProfile.display_name) updates.display_name = name;
  if (setupColor && setupColor !== myProfile.avatar_color) updates.avatar_color = setupColor;
  if (!Object.keys(updates).length) return;
  const prev = { display_name: myProfile.display_name, avatar_color: myProfile.avatar_color };
  Object.assign(myProfile, updates); // optimistic — existing profile update path
  renderProfileHero();
  try {
    const { error } = await sb.from('profiles').update(updates).eq('id', myProfile.id);
    if (error) throw error;
    loadFeed(); // cards pick up the new name
  } catch (e) {
    Object.assign(myProfile, prev); // roll back
    renderProfileHero();
    showToast(e.message || t('toast_could_not_save'));
  }
}

/* ── S4a IDENTITY ── */
// Brand palette — keep in sync with handle_new_user() in schema.sql
const AVATAR_PALETTE = ['#4A7C59','#D97B1A','#6D28D9','#335736','#B8620A'];
let myProfile = null; // { id, display_name, avatar_color } once a session exists

function initialsFor(name) {
  return (name || 'P').trim().split(/\s+/).map(w => w[0]).join('').slice(0, 2).toUpperCase() || 'P';
}

function renderProfileHero() {
  const nameEl = document.getElementById('profile-name-display');
  const avEl = document.getElementById('profile-avatar');
  if (myProfile) {
    nameEl.textContent = myProfile.display_name;
    avEl.textContent = initialsFor(myProfile.display_name);
    avEl.style.background = myProfile.avatar_color;
    avEl.style.color = '#fff';
  } else {
    nameEl.textContent = 'Planter';
    avEl.textContent = 'P';
    avEl.style.background = '';
    avEl.style.color = '';
  }
}

async function loadOwnProfile() {
  if (!sb) return;
  try {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) { renderProfileHero(); renderEmailRow(null); renderMyPlants(); renderProfileStats(); return; }
    const { data, error } = await sb.from('profiles')
      .select('id, display_name, avatar_color').eq('id', session.user.id).single();
    if (error) throw error;
    myProfile = data;
    renderProfileHero();
    renderEmailRow(session.user);
    renderMyPlants();
    renderProfileStats();
  } catch (e) {
    renderProfileHero(); // hero falls back to the honest default state
    renderMyPlants();
    renderProfileStats();
  }
}

function startNameEdit() {
  if (!myProfile) { showToast(t('toast_log_first_plant')); return; }
  const input = document.getElementById('profile-name-input');
  input.value = myProfile.display_name;
  document.getElementById('profile-name-edit').classList.add('visible');
  document.getElementById('profile-name-display').style.display = 'none';
  input.focus();
}

function cancelNameEdit() {
  document.getElementById('profile-name-edit').classList.remove('visible');
  document.getElementById('profile-name-display').style.display = '';
}

async function saveNameEdit() {
  const val = document.getElementById('profile-name-input').value.trim();
  if (!val) { showToast(t('toast_name_cannot_be_empty')); return; }
  const prev = myProfile.display_name;
  myProfile.display_name = val; // optimistic
  renderProfileHero();
  cancelNameEdit();
  try {
    const { error } = await sb.from('profiles')
      .update({ display_name: val }).eq('id', myProfile.id);
    if (error) throw error;
  } catch (e) {
    myProfile.display_name = prev; // roll back
    renderProfileHero();
    showToast(e.message || t('toast_could_not_save_name'));
  }
}

async function cycleAvatar() {
  if (!myProfile) { showToast(t('toast_log_first_plant')); return; }
  const i = AVATAR_PALETTE.indexOf(myProfile.avatar_color);
  const next = AVATAR_PALETTE[(i + 1) % AVATAR_PALETTE.length];
  const prev = myProfile.avatar_color;
  myProfile.avatar_color = next; // optimistic
  renderProfileHero();
  try {
    const { error } = await sb.from('profiles')
      .update({ avatar_color: next }).eq('id', myProfile.id);
    if (error) throw error;
  } catch (e) {
    myProfile.avatar_color = prev; // roll back
    renderProfileHero();
    showToast(e.message || t('toast_could_not_save_color'));
  }
}

async function renderMyPlants() {
  const container = document.getElementById('my-plants-list');
  if (!sb || !myProfile) {
    container.innerHTML = '<div style="color:var(--ash);padding:12px 0">Nothing planted yet. Your first plant lands here.</div>';
    return;
  }
  try {
    const { data, error } = await sb.from('plants')
      .select('id, plant_name, tags, kind, planted_at')
      .eq('user_id', myProfile.id)
      .order('planted_at', { ascending: false })
      .limit(50);
    if (error) throw error;
    if (!data || data.length === 0) {
      container.innerHTML = '<div style="color:var(--ash);padding:12px 0">Nothing planted yet. Your first plant lands here.</div>';
      return;
    }
    const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    container.innerHTML = data.map(p => {
      const d = new Date(p.planted_at);
      const month = monthNames[d.getMonth()];
      const day = d.getDate();
      const hasEdible = p.tags && p.tags.includes('edible');
      const dotClass = hasEdible ? 'plant-log-dot edible' : 'plant-log-dot';
      const foundChip = p.kind === 'discovered' ? '<span style="font-size:11px;color:var(--ash);margin-left:6px">Found</span>' : '';
      return `<div class="plant-log-item">
        <div class="${dotClass}"></div>
        <span class="plant-log-name">${p.plant_name}${foundChip}</span>
        <span class="plant-log-date">${month} ${day}</span>
      </div>`;
    }).join('');
  } catch (e) {
    container.innerHTML = '<div style="color:var(--ash);padding:12px 0">Could not load plants.</div>';
  }
}

async function renderProfileStats() {
  const container = document.getElementById('profile-stats');
  if (!sb || !myProfile) {
    container.innerHTML = `
      <div class="stat-card"><div class="stat-num">0</div><div class="stat-label">Planted</div></div>
      <div class="stat-card"><div class="stat-num">0</div><div class="stat-label">Found</div></div>
    `;
    return;
  }
  try {
    const [planted, found] = await Promise.all([
      sb.from('plants').select('*', { count: 'exact', head: true }).eq('user_id', myProfile.id).eq('kind', 'planted'),
      sb.from('plants').select('*', { count: 'exact', head: true }).eq('user_id', myProfile.id).eq('kind', 'discovered')
    ]);
    const plantedCount = planted.count || 0;
    const foundCount = found.count || 0;
    container.innerHTML = `
      <div class="stat-card"><div class="stat-num">${plantedCount}</div><div class="stat-label">Planted</div></div>
      <div class="stat-card"><div class="stat-num">${foundCount}</div><div class="stat-label">Found</div></div>
    `;
  } catch (e) {
    container.innerHTML = `
      <div class="stat-card"><div class="stat-num">0</div><div class="stat-label">Planted</div></div>
      <div class="stat-card"><div class="stat-num">0</div><div class="stat-label">Found</div></div>
    `;
  }
}

/* ── S4a EMAIL UPGRADE ── */
function renderEmailRow(user) {
  const keepRow = document.getElementById('email-upgrade-row');
  const signInRow = document.getElementById('sign-in-row');
  const signOutRow = document.getElementById('sign-out-row');
  if (!user || user.is_anonymous === true) {
    // No session OR anonymous session: always show Sign in with Google
    keepRow.style.display = 'none';
    document.getElementById('email-upgrade-edit').classList.remove('visible');
    signInRow.style.display = '';
    signOutRow.style.display = 'none';
    return;
  }
  // Durable session (non-anonymous): show protected state
  signInRow.style.display = 'none';
  keepRow.style.display = '';
  const provider = (user.app_metadata && user.app_metadata.provider) || 'email';
  document.getElementById('email-upgrade-label').textContent = provider === 'google' ? 'Signed in with Google' : 'Garden protected';
  document.getElementById('email-upgrade-value').textContent =
    provider === 'google' ? (user.email || 'Google account') : (user.email || 'Linked');
  keepRow.dataset.protected = '1';
  document.getElementById('email-upgrade-edit').classList.remove('visible');
  // Sign out ONLY for non-anonymous sessions (tripwire 12)
  signOutRow.style.display = '';
}

/* ── S4d GOOGLE SIGN-IN + GUARDED SIGN OUT ── */

function confirmSignOut() {
  openSheet(
    [{ label: 'Sign out', danger: true, handler: doSignOut }],
    'Sign out of Johnny Appleseed?'
  );
}

async function doSignOut() {
  if (!sb) return;
  try {
    // Tripwire 12: NEVER sign out an anonymous session — it orphans the garden
    const { data: { session } } = await sb.auth.getSession();
    if (!session || session.user.is_anonymous !== false) return;
    const { error } = await sb.auth.signOut();
    if (error) throw error;
    myProfile = null;
    myUserId = null;
    followedIds = new Set();
    blockedIds = new Set();
    renderProfileHero();
    renderEmailRow(null);
    setNotifBadge(0);
    loadFeed();
    if (map) renderMarkers(currentFilter);
    showToast(t('toast_signed_out'));
  } catch (e) {
    showToast(e.message || t('toast_could_not_sign_out'));
  }
}

function startEmailUpgrade() {
  const row = document.getElementById('email-upgrade-row');
  if (row.dataset.protected === '1') return; // already confirmed — disabled state
  if (!sb) { showToast(t('toast_sharing_offline')); return; }
  if (!myProfile) { showToast(t('toast_log_first_plant')); return; }
  document.getElementById('email-upgrade-edit').classList.add('visible');
  document.getElementById('email-upgrade-input').focus();
}

function cancelEmailUpgrade() {
  document.getElementById('email-upgrade-edit').classList.remove('visible');
}

async function submitEmailUpgrade() {
  const email = document.getElementById('email-upgrade-input').value.trim();
  if (!email) { showToast(t('toast_enter_email')); return; }
  try {
    const { error } = await sb.auth.updateUser({ email: email });
    if (error) throw error;
    showToast(t('toast_check_inbox'));
    cancelEmailUpgrade();
  } catch (e) {
    showToast(e.message || t('toast_could_not_send_link'));
  }
}

// ja_log_count is a SACRED key — snapshot, mutate, verify read-back
function bumpLogCount() {
  try {
    const prev = parseInt(localStorage.getItem('ja_log_count') || '0', 10) || 0;
    const count = prev + 1;
    localStorage.setItem('ja_log_count', String(count));
    if (localStorage.getItem('ja_log_count') !== String(count)) return; // write failed — skip nudge
    if (count === 3) {
      // The one-time nudge: fires only on the exact 3rd log, never on load
      setTimeout(() => showToast(t('toast_add_email_reminder')), 3200);
    }
  } catch (e) { /* storage unavailable — nudge is best-effort */ }
}

// v0.37.0: ja_lang is a SACRED key — snapshot, mutate, verify read-back, then reload
function setLang(lang) {
  try {
    const prev = localStorage.getItem('ja_lang');
    localStorage.setItem('ja_lang', lang);
    if (localStorage.getItem('ja_lang') !== lang) {
      console.error('ja_lang write failed — language not changed');
      return;
    }
    location.reload();
  } catch (e) {
    console.error('Could not set language:', e);
  }
}

function showAuthError(msg, rawError) {
  const title = t('sheet_auth_error_title');
  let detail = msg;
  if (rawError) {
    const errMsg = rawError.message || rawError.error_description || rawError.error || '';
    const status = rawError.status || rawError.code || '';
    const raw = status ? `${errMsg} (${status})` : errMsg;
    detail = `${msg}\n\nRaw error: ${raw || JSON.stringify(rawError)}`;
  }
  openSheet(
    [{ label: t('sheet_auth_error_dismiss'), handler: closeSheet }],
    title,
    detail
  );
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

// Init: set map mode on load since map is the default tab
document.addEventListener('DOMContentLoaded', () => {
  // v0.37.0: language resolution (ja_lang -> navigator -> 'en')
  const stored = localStorage.getItem('ja_lang');
  LANG = stored || (navigator.language && navigator.language.startsWith('es') ? 'es' : 'en');
  document.documentElement.lang = LANG;

  applyStrings(); // v0.36.0: i18n static markup
  // v0.36.1: location bar template with data interpolation
  document.getElementById('location-text').textContent = t('location_showing', { place: REGION.name });
  // v0.37.0: set language display in settings and splash
  document.getElementById('language-value').textContent = LANG === 'en' ? 'English' : 'Español';
  document.getElementById('splash-lang-link').textContent = LANG === 'en' ? 'Español' : 'English';
  document.getElementById('topbar').classList.add('map-mode');
  document.body.classList.add('tab-map');
  initMap();
  loadFeed();
  loadOwnProfile();
  handleOauthReturn(); // after supabase-js session pickup at createClient
  initPullToRefresh();

  // v0.22.0 hero video fadeout on end
  const heroVideo = document.querySelector('.hero-video');
  if (heroVideo) {
    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
      heroVideo.style.display = 'none';
    } else {
      heroVideo.addEventListener('ended', () => {
        heroVideo.classList.add('fadeout');
      });
    }
  }

  // v0.22.0 welcome-back panel (returning users only)
  const userId = localStorage.getItem('ja_user_id');
  const splashSeen = localStorage.getItem('ja_splash_seen');
  if (userId && splashSeen === 'true') {
    // Hide first-time buttons, show welcome panel
    document.querySelector('.splash-cta').style.display = 'none';
    document.querySelector('.splash-secondary').style.display = 'none';
    document.querySelector('.splash-privacy').style.display = 'none';

    const welcomePanel = document.getElementById('welcome-back');
    const displayName = localStorage.getItem('ja_display_name') || 'Gardener';
    document.getElementById('wb-greeting-text').textContent = t('splash_welcome_back', { name: displayName });
    welcomePanel.style.display = 'block';
    setTimeout(() => welcomePanel.classList.add('show'), 800);

    // "Let's go" → Add tab
    document.querySelector('.wb-cta').addEventListener('click', () => {
      enterApp();
      setTimeout(() => setActiveTab('add'), 100);
    });

    // Tap anywhere else on splash → Map tab (returning user skips onboard)
    document.getElementById('splash').addEventListener('click', (e) => {
      if (e.target.closest('#welcome-back')) return; // Don't dismiss if clicking the panel
      enterApp();
      setTimeout(() => setActiveTab('map'), 100);
    });
  }
});

// OAuth redirect return: supabase-js picks the session up automatically;
// re-run the profile + badge loads so the UI reflects the linked account
if (sb) {
  sb.auth.onAuthStateChange((event) => {
    if (event === 'SIGNED_IN') {
      loadOwnProfile();
      loadNotifBadge();
    }
  });
}

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
